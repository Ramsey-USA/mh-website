packages:
  - "apps/*"
  - "packages/*"
overrides:
  postcss: 8.5.15
  js-yaml@3.14.2: 3.15.0
  js-yaml@4.1.1: 4.2.0
allowBuilds:
  "@parcel/watcher": true
  "@swc/core": true
  esbuild: true
  puppeteer: true
  sharp: true
  tesseract.js: true
  unrs-resolver: true
  workerd: true
onlyBuiltDependencies:
  - "@parcel/watcher"
  - "@swc/core"
  - esbuild
  - puppeteer
  - sharp
  - tesseract.js
  - unrs-resolver
  - workerd
minimumReleaseAgeExclude:
  - "@cloudflare/workerd-darwin-64@1.20260630.1"
  - "@cloudflare/workerd-darwin-arm64@1.20260630.1"
  - "@cloudflare/workerd-linux-64@1.20260630.1"
  - "@cloudflare/workerd-linux-arm64@1.20260630.1"
  - "@cloudflare/workerd-windows-64@1.20260630.1"
  - miniflare@4.20260630.0
  - workerd@1.20260630.1
  - wrangler@4.106.0
