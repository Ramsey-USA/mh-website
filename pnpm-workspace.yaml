packages:
  - "apps/*"
  - "packages/*"
overrides:
  postcss: 8.5.15
  "@opentelemetry/core": 2.9.0
  js-yaml@3.14.2: 3.15.0
  js-yaml@4.1.1: 4.2.0
allowBuilds:
  "@parcel/watcher": true
  "@swc/core": true
  esbuild: true
  puppeteer: true
  sharp: true
  tesseract.js: true
  unrs-resolver: true
  workerd: true
onlyBuiltDependencies:
  - "@parcel/watcher"
  - "@swc/core"
  - esbuild
  - puppeteer
  - sharp
  - tesseract.js
  - unrs-resolver
  - workerd
minimumReleaseAgeExclude:
  - "@cloudflare/workerd-darwin-64@1.20260630.1"
  - "@cloudflare/workerd-darwin-arm64@1.20260630.1"
  - "@cloudflare/workerd-linux-64@1.20260630.1"
  - "@cloudflare/workerd-linux-arm64@1.20260630.1"
  - "@cloudflare/workerd-windows-64@1.20260630.1"
  - miniflare@4.20260630.0
  - workerd@1.20260630.1
  - wrangler@4.106.0
  - "@radix-ui/primitive@1.1.5"
  - "@radix-ui/react-collection@1.1.12"
  - "@radix-ui/react-context@1.2.0"
  - "@radix-ui/react-presence@1.1.7"
  - "@radix-ui/react-progress@1.1.12"
  - "@radix-ui/react-roving-focus@1.1.15"
  - "@radix-ui/react-tabs@1.1.17"
  - "@typescript-eslint/eslint-plugin@8.63.0"
  - "@typescript-eslint/parser@8.63.0"
  - "@typescript-eslint/project-service@8.63.0"
  - "@typescript-eslint/scope-manager@8.63.0"
  - "@typescript-eslint/tsconfig-utils@8.63.0"
  - "@typescript-eslint/type-utils@8.63.0"
  - "@typescript-eslint/types@8.63.0"
  - "@typescript-eslint/typescript-estree@8.63.0"
  - "@typescript-eslint/utils@8.63.0"
  - "@typescript-eslint/visitor-keys@8.63.0"
