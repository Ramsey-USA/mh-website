version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: deps
      include: scope
    groups:
      prod-patch-minor:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-patch-minor:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: America/Los_Angeles
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
      include: scope
