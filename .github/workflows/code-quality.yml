name: Code Quality Checks

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    quality-checks:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [22.x]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Type check
              run: npm run type-check

            - name: Lint check
              run: npm run lint

            - name: Run tests
              run: npm run test:ci

            - name: Check for unused dependencies
              run: npx depcheck --ignores="@types/*,eslint-*,prettier,husky,@commitlint/*,postcss,autoprefixer,jest-environment-jsdom,@cloudflare/next-on-pages,chalk"

            - name: Build project
              run: npm run build

            - name: Check bundle size
              run: |
                  echo "Checking bundle size..."
                  npm run bundle:size || echo "Bundle size check complete"

    security-audit:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22.x"

            - name: Run security audit
              run: npm audit --audit-level=moderate
              continue-on-error: true
