name: Optimize Images & Videos

on:
  push:
    paths:
      - "public/images/**"
      - "public/videos/**"
    branches:
      - main
      - develop
  pull_request:
    paths:
      - "public/images/**"
      - "public/videos/**"

jobs:
  optimize:
    name: Optimize Media Assets
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: release
          architecture: x64

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v46.0.1
        with:
          files: |
            public/images/**/*.{png,jpg,jpeg}
            public/videos/**/*.{mp4,mov,avi,webm}

      - name: Optimize Images
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "🖼️ Optimizing images..."
          npm run optimize:images -- --ci
          echo "✅ Image optimization complete"

      - name: Optimize Videos
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "🎥 Optimizing videos..."
          npm run optimize:videos -- --ci
          echo "✅ Video optimization complete"

      - name: Check for changes
        id: verify-changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "📊 Optimization resulted in changes"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No optimization changes needed"
          fi

      - name: Commit optimized media
        if: steps.verify-changes.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Add all optimized files
          git add public/images/**/*.webp || true
          git add public/videos/**/*.webm || true
          git add public/videos/**/*.mp4 || true
          git add public/videos/**/poster-*.jpg || true

          # Create detailed commit message
          OPTIMIZED_COUNT=$(git diff --cached --numstat | wc -l)
          SAVED_BYTES=$(git diff --cached --stat | tail -1 | grep -oP '\d+ insertion' | grep -oP '\d+' || echo "0")

          git commit -m "🤖 Auto-optimize media assets

          Optimized $OPTIMIZED_COUNT files
          - Images converted to WebP/AVIF
          - Videos converted to WebM/MP4
          - Poster images generated
          - Sizes optimized for web delivery

          Automated by GitHub Actions
          [skip ci]"

      - name: Push changes
        if: steps.verify-changes.outputs.changes == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

      - name: Enforce video size budget
        run: |
          echo "📏 Checking video file size budgets (WebM ≤ 10 MB, MP4 ≤ 15 MB)..."
          OVERSIZED_WEBM=$(find public/videos -name "*.webm" -size +10M 2>/dev/null)
          OVERSIZED_MP4=$(find public/videos -name "*.mp4" -size +15M 2>/dev/null)
          FAIL=false
          if [ -n "$OVERSIZED_WEBM" ]; then
            echo "❌ WebM files exceeding the 10 MB limit:"
            echo "$OVERSIZED_WEBM" | while read f; do
              SIZE=$(du -sh "$f" | cut -f1)
              echo "  $SIZE  $f"
            done
            FAIL=true
          fi
          if [ -n "$OVERSIZED_MP4" ]; then
            echo "❌ MP4 files exceeding the 15 MB limit:"
            echo "$OVERSIZED_MP4" | while read f; do
              SIZE=$(du -sh "$f" | cut -f1)
              echo "  $SIZE  $f"
            done
            FAIL=true
          fi
          if [ "$FAIL" = "true" ]; then
            echo ""
            echo "Run 'npm run optimize:videos -- --force' locally to re-pack these files."
            exit 1
          fi
          echo "✅ All video files are within the size budget"

      - name: Enforce 500 KB image size budget
        run: |
          echo "📏 Checking WebP file size budget (max 500 KB per file)..."
          OVERSIZED=$(find public/images -name "*.webp" -size +500k 2>/dev/null)
          if [ -n "$OVERSIZED" ]; then
            echo "❌ The following WebP files exceed the 500 KB limit:"
            echo "$OVERSIZED" | while read f; do
              SIZE=$(du -sh "$f" | cut -f1)
              echo "  $SIZE  $f"
            done
            echo ""
            echo "Run 'npm run optimize:images -- --force' locally to re-pack these files."
            exit 1
          fi
          echo "✅ All WebP files are within the 500 KB budget"

      - name: Generate optimization report
        if: steps.verify-changes.outputs.changes == 'true'
        run: |
          echo "## 📊 Media Optimization Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images Optimized" >> $GITHUB_STEP_SUMMARY
          find public/images -type f -name "*.webp" 2>/dev/null | wc -l >> $GITHUB_STEP_SUMMARY || echo "0" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Videos Optimized" >> $GITHUB_STEP_SUMMARY
          find public/videos -type f -name "*.webm" 2>/dev/null | wc -l >> $GITHUB_STEP_SUMMARY || echo "0" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All media assets optimized for web delivery" >> $GITHUB_STEP_SUMMARY
