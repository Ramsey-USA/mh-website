---
name: Nightly Coverage

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-coverage-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"

jobs:
  website-coverage:
    name: Website Coverage (Nightly)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run website coverage tests
        working-directory: apps/website
        run: npm run test:ci:coverage

      - name: Upload website coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-coverage-${{ github.run_id }}
          path: |
            apps/website/coverage/lcov.info
            apps/website/coverage/coverage-final.json
            apps/website/coverage/index.html
            apps/website/coverage/lcov-report/**
          if-no-files-found: warn
