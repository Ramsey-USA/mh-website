name: CI/CD Pipeline

# Deployment is handled by Cloudflare Workers auto-deploy (watches main branch).
# This pipeline is a quality gate: type-check, lint, test, and build must all
# pass before code reaches production via Cloudflare Workers.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  NEXT_PUBLIC_SITE_URL: https://www.mhc-gc.com
  HUSKY: "0"
  PUPPETEER_SKIP_DOWNLOAD: "true"

jobs:
  # ──────────────────────────────────────────────────────────────
  # Workspace-level quality checks (run once for whole monorepo)
  # ──────────────────────────────────────────────────────────────
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies (workspace root)
        run: pnpm install --frozen-lockfile

      - name: Enforce IndexNow key for main checks
        if: >-
          (github.event_name == 'pull_request' && github.base_ref == 'main') ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -z "${INDEXNOW_KEY}" ]; then
            echo "INDEXNOW_KEY secret is required for main branch SEO checks."
            exit 1
          fi

      - name: Enforce generated artifact guard
        run: npm run guard:generated-artifacts

      - name: Enforce branding docs contracts guard
        run: npm run docs:guardrails:contracts

      - name: Detect Lighthouse artifact changes
        id: perf_changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$BASE_SHA" "$GITHUB_SHA" | grep -q '^lighthouse-results/summary\.json$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate Lighthouse summary artifact (strict)
        if: steps.perf_changes.outputs.changed == 'true'
        working-directory: apps/website
        run: npm run perf:gate

      - name: Sync docs/messages/documents into app
        run: bash scripts/docs/sync-to-app.sh

      - name: Run TypeScript type check — website
        working-directory: apps/website
        run: npm run type-check

      - name: Run TypeScript type check — dashboard
        working-directory: apps/dashboard
        run: npm run type-check

      - name: Run ESLint — website
        working-directory: apps/website
        run: npm run lint

      - name: Verify SEO route policy sync — website
        working-directory: apps/website
        run: npm run seo:routes:sync:check

      - name: Validate SEO route indexing policy — website
        working-directory: apps/website
        run: npm run seo:routes:check

      - name: Validate Jeremy SEO signal coverage — website
        working-directory: apps/website
        run: npm run seo:jeremy:signals:check

      - name: Validate Jeremy route metadata coverage — website
        working-directory: apps/website
        run: npm run seo:jeremy:metadata:check

      - name: Run ESLint — dashboard
        working-directory: apps/dashboard
        run: npm run lint

      - name: Run dashboard deploy guardrails
        working-directory: apps/dashboard
        run: npm run guardrails:dashboard

      - name: Restore Prettier cache
        uses: actions/cache@v4
        with:
          path: .prettier-cache
          key: prettier-cache-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            prettier-cache-${{ hashFiles('pnpm-lock.yaml') }}-
            prettier-cache-

      - name: Run Prettier check
        run: npm run format:check

      - name: Run Brand Lint
        env:
          BRAND_LINT_CHANGED_ONLY: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
          BRAND_LINT_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
        run: npm run lint:brand

      - name: Run tests — website
        working-directory: apps/website
        run: npm run test:ci

      - name: Run tests — dashboard
        working-directory: apps/dashboard
        run: npm run test:ci

      - name: Run dashboard route smoke test
        working-directory: apps/dashboard
        run: npm run smoke:routes:ci

      - name: Check public asset budgets
        working-directory: apps/website
        run: npm run check:asset-budgets

      - name: Check hero commercial guardrails
        working-directory: apps/website
        run: npm run check:hero-commercials

      - name: Check client terminology guardrails
        working-directory: apps/website
        run: npm run terminology:guardrails:check

      - name: Check for unused dependencies — website
        working-directory: apps/website
        run: npm run deps:check

  # Security Audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: quality-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run internal dependency security check
        run: npm run security:check:prod

  # Build Verification — Website
  build-website:
    name: Build Next.js (Website)
    runs-on: ubuntu-latest
    needs: [quality-checks]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Restore Next.js build cache (website)
        uses: actions/cache@v4
        with:
          path: |
            apps/website/.next/cache
            apps/website/.open-next/cache
          key: nextjs-website-cache-${{ hashFiles('pnpm-lock.yaml') }}-${{
            hashFiles('apps/website/src/**', 'packages/shared/src/**', 'apps/website/next.config.js', 'apps/website/open-next.config.ts') }}
          restore-keys: |
            nextjs-website-cache-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-website-cache-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @mhc/website...

      - name: Enforce IndexNow key for production deploy
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -z "${INDEXNOW_KEY}" ]; then
            echo "INDEXNOW_KEY secret is required for main deploys."
            exit 1
          fi

      - name: Build website
        working-directory: apps/website
        run: npm run build

      - name: Check bundle size
        working-directory: apps/website
        run: npm run bundle:report

  # Build Verification — Dashboard
  build-dashboard:
    name: Build Next.js (Dashboard)
    runs-on: ubuntu-latest
    needs: [quality-checks]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Restore Next.js build cache (dashboard)
        uses: actions/cache@v4
        with:
          path: |
            apps/dashboard/.next/cache
            apps/dashboard/.open-next/cache
          key: nextjs-dashboard-cache-${{ hashFiles('pnpm-lock.yaml') }}-${{
            hashFiles('apps/dashboard/src/**', 'packages/shared/src/**', 'apps/dashboard/next.config.js', 'apps/dashboard/open-next.config.ts') }}
          restore-keys: |
            nextjs-dashboard-cache-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-dashboard-cache-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @mhc/dashboard...

      - name: Build dashboard
        working-directory: apps/dashboard
        run: npm run build

  # Deploy to Cloudflare Workers — runs only on pushes to main
  deploy-website:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: [build-website, security-audit]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Restore Next.js build cache (website)
        uses: actions/cache@v4
        with:
          path: |
            apps/website/.next/cache
            apps/website/.open-next/cache
          key: nextjs-website-cache-${{ hashFiles('pnpm-lock.yaml') }}-${{
            hashFiles('apps/website/src/**', 'packages/shared/src/**', 'apps/website/next.config.js', 'apps/website/open-next.config.ts') }}
          restore-keys: |
            nextjs-website-cache-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-website-cache-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @mhc/website...

      - name: Build website
        working-directory: apps/website
        run: npm run build

      - name: Deploy to Cloudflare Workers
        working-directory: apps/website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          WRANGLER_SEND_METRICS: "false"
        run: npm run deploy

      - name: Submit sitemap updates to search engines
        working-directory: apps/website
        env:
          NEXT_PUBLIC_SITE_URL: ${{ env.NEXT_PUBLIC_SITE_URL }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          BAIDU_PUSH_TOKEN: ${{ secrets.BAIDU_PUSH_TOKEN }}
        run: npm run seo:sitemaps:submit
