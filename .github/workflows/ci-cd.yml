name: CI/CD Pipeline

# Source of truth: this workflow validates and deploys production via wrangler.
# Disable Cloudflare Dashboard Git auto-deploy to avoid duplicate builds.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  NEXT_PUBLIC_SITE_URL: https://www.mhc-gc.com
  HUSKY: "0"
  PUPPETEER_SKIP_DOWNLOAD: "true"

jobs:
  # ──────────────────────────────────────────────────────────────
  # Workspace-level quality checks (run once for whole monorepo)
  # ──────────────────────────────────────────────────────────────
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace
        with:
          fetch-depth: "0"
          node-version: ${{ env.NODE_VERSION }}

      - name: Enforce IndexNow key for main checks
        if: >-
          github.actor != 'dependabot[bot]' &&
          ((github.event_name == 'pull_request' && github.base_ref == 'main') ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
          )
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -z "${INDEXNOW_KEY}" ]; then
            echo "INDEXNOW_KEY secret is required for main branch SEO checks."
            exit 1
          fi

      - name: Enforce generated artifact guard
        run: npm run guard:generated-artifacts

      - name: Enforce branding docs contracts guard
        run: npm run docs:guardrails:contracts

      - name: Enforce docs stack/version congruency guard
        run: npm run docs:stack:congruency:check

      - name: Enforce migration mirror sync guard
        run: npm run migrations:sync:check

      - name: Enforce root script wrapper sync guard
        run: npm run scripts:sync:check

      - name: Enforce app mirror sync guard
        run: npm run app:mirrors:sync:check

      - name: Enforce manual template congruence guard
        run: npm run docs:guardrails:manual-congruence

      - name: Detect Lighthouse artifact changes
        id: perf_changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$BASE_SHA" "$GITHUB_SHA" | grep -q '^lighthouse-results/summary\.json$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate Lighthouse summary artifact (strict)
        if: steps.perf_changes.outputs.changed == 'true'
        working-directory: apps/website
        run: npm run perf:gate

      - name: Sync docs/messages/documents into app
        run: bash scripts/docs/sync-to-app.sh

      - name: Run TypeScript type check — website
        working-directory: apps/website
        run: npm run type-check

      - name: Run TypeScript type check — dashboard
        working-directory: apps/dashboard
        run: npm run type-check

      - name: Run ESLint — website
        working-directory: apps/website
        run: npm run lint

      - name: Verify SEO route policy sync — website
        working-directory: apps/website
        run: npm run seo:routes:sync:check

      - name: Validate SEO route indexing policy — website
        working-directory: apps/website
        run: npm run seo:routes:check

      - name: Verify route integrity — website
        working-directory: apps/website
        run: npm run verify:route-integrity

      - name: Validate Jeremy SEO signal coverage — website
        working-directory: apps/website
        run: npm run seo:jeremy:signals:check

      - name: Validate Jeremy route metadata coverage — website
        working-directory: apps/website
        run: npm run seo:jeremy:metadata:check

      - name: Run ESLint — dashboard
        working-directory: apps/dashboard
        run: npm run lint

      - name: Run dashboard deploy guardrails
        working-directory: apps/dashboard
        run: npm run guardrails:dashboard

      - name: Restore Prettier cache
        uses: actions/cache@v6
        with:
          path: .prettier-cache
          key: prettier-cache-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            prettier-cache-${{ hashFiles('pnpm-lock.yaml') }}-
            prettier-cache-

      - name: Run Prettier check
        run: npm run format:check

      - name: Run Brand Lint
        env:
          BRAND_LINT_CHANGED_ONLY: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
          BRAND_LINT_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
        run: npm run lint:brand

      - name: Run tests — website
        working-directory: apps/website
        run: npm run test:ci

      - name: Run tests — dashboard
        working-directory: apps/dashboard
        run: npm run test:ci

      - name: Run dashboard route smoke test
        working-directory: apps/dashboard
        run: npm run smoke:routes:ci

      - name: Check public asset budgets
        working-directory: apps/website
        run: npm run check:asset-budgets

      - name: Check hero commercial guardrails
        working-directory: apps/website
        run: npm run check:hero-commercials

      - name: Check client terminology guardrails
        working-directory: apps/website
        run: npm run terminology:guardrails:check

      - name: Enforce strict Spanish coverage signals
        working-directory: apps/website
        env:
          SPANISH_COVERAGE_STRICT: "1"
        run: npm run report:spanish:coverage

      - name: Check for unused dependencies — website
        working-directory: apps/website
        run: npm run deps:check

  # Security Audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: quality-checks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run internal dependency security check
        run: npm run security:check

  # Build Verification — Website
  build-website:
    name: Build Next.js (Website)
    runs-on: ubuntu-latest
    needs: [quality-checks]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace
        with:
          node-version: ${{ env.NODE_VERSION }}
          install-command: pnpm install --frozen-lockfile --filter @mhc/website... --loglevel error

      - name: Restore Next.js build cache (website)
        uses: actions/cache@v6
        with:
          path: |
            apps/website/.next/cache
            apps/website/.open-next/cache
          key: nextjs-website-cache-${{ hashFiles('pnpm-lock.yaml') }}-${{
            hashFiles('apps/website/src/**', 'packages/shared/src/**', 'apps/website/next.config.js', 'apps/website/open-next.config.ts') }}
          restore-keys: |
            nextjs-website-cache-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-website-cache-

      - name: Enforce IndexNow key for production deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -z "${INDEXNOW_KEY}" ]; then
            echo "INDEXNOW_KEY secret is required for main deploys."
            exit 1
          fi

      - name: Build website
        working-directory: apps/website
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npm run verify:route-integrity
            npm run build:next
          else
            npm run build
          fi

      - name: Check bundle size
        working-directory: apps/website
        run: npm run bundle:report

  # Build Verification — Dashboard
  build-dashboard:
    name: Build Next.js (Dashboard)
    runs-on: ubuntu-latest
    needs: [quality-checks]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace
        with:
          node-version: ${{ env.NODE_VERSION }}
          install-command: pnpm install --frozen-lockfile --filter @mhc/dashboard... --loglevel error

      - name: Restore Next.js build cache (dashboard)
        uses: actions/cache@v6
        with:
          path: |
            apps/dashboard/.next/cache
            apps/dashboard/.open-next/cache
          key: nextjs-dashboard-cache-${{ hashFiles('pnpm-lock.yaml') }}-${{
            hashFiles('apps/dashboard/src/**', 'packages/shared/src/**', 'apps/dashboard/next.config.js', 'apps/dashboard/open-next.config.ts') }}
          restore-keys: |
            nextjs-dashboard-cache-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-dashboard-cache-

      - name: Build dashboard
        working-directory: apps/dashboard
        run: npm run build

  # Deploy to Cloudflare Workers — runs only on pushes to main
  deploy-website:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: [build-website, security-audit]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace
        with:
          node-version: ${{ env.NODE_VERSION }}
          install-command: pnpm install --frozen-lockfile --filter @mhc/website... --loglevel error

      - name: Restore Next.js build cache (website)
        uses: actions/cache@v6
        with:
          path: |
            apps/website/.next/cache
            apps/website/.open-next/cache
          key: nextjs-website-cache-${{ hashFiles('pnpm-lock.yaml') }}-${{
            hashFiles('apps/website/src/**', 'packages/shared/src/**', 'apps/website/next.config.js', 'apps/website/open-next.config.ts') }}
          restore-keys: |
            nextjs-website-cache-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-website-cache-

      - name: Build website
        working-directory: apps/website
        run: npm run build

      - name: Deploy to Cloudflare Workers
        working-directory: apps/website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          WRANGLER_SEND_METRICS: "false"
        run: npm run deploy

      - name: Submit sitemap updates to search engines
        working-directory: apps/website
        env:
          NEXT_PUBLIC_SITE_URL: ${{ env.NEXT_PUBLIC_SITE_URL }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          BAIDU_PUSH_TOKEN: ${{ secrets.BAIDU_PUSH_TOKEN }}
        run: npm run seo:sitemaps:submit

      - name: Purge Cloudflare cache (smart path detection)
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ env.NEXT_PUBLIC_SITE_URL }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ] || [ -z "${CLOUDFLARE_ZONE_ID}" ]; then
            echo "⚠️  Skipping cache purge: CLOUDFLARE_API_TOKEN or CLOUDFLARE_ZONE_ID not set"
            exit 0
          fi

          # Get the list of changed files since the previous commit
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD || echo "src/app src/components" )

          # Initialize array of paths to purge
          PURGE_URLS=()

          # If core component files or layout changed, purge everything
          if echo "$CHANGED_FILES" | grep -qE "^(src/components|src/app/layout|src/app/middleware|next\.config|tailwind\.config)" ; then
            echo "🧹 Core components/layout changed → purging all pages"
            PURGE_URLS=(
              "${NEXT_PUBLIC_SITE_URL}/"
              "${NEXT_PUBLIC_SITE_URL}/*"
              "${NEXT_PUBLIC_SITE_URL}/api/*"
            )
          else
            # Smart path detection: map src files to URL paths
            PURGE_URLS=("${NEXT_PUBLIC_SITE_URL}/")  # Always purge home

            # Check for specific page changes
            echo "$CHANGED_FILES" | while IFS= read -r file; do
              case "$file" in
                src/app/about/*)          echo "${NEXT_PUBLIC_SITE_URL}/about" ;;
                src/app/services/*)       echo "${NEXT_PUBLIC_SITE_URL}/services"; echo "${NEXT_PUBLIC_SITE_URL}/services/*" ;;
                src/app/projects/*)       echo "${NEXT_PUBLIC_SITE_URL}/projects"; echo "${NEXT_PUBLIC_SITE_URL}/projects/*" ;;
                src/app/team/*)           echo "${NEXT_PUBLIC_SITE_URL}/team" ;;
                src/app/contact/*)        echo "${NEXT_PUBLIC_SITE_URL}/contact" ;;
                src/app/careers/*)        echo "${NEXT_PUBLIC_SITE_URL}/careers" ;;
                src/app/faq/*)            echo "${NEXT_PUBLIC_SITE_URL}/faq"; echo "${NEXT_PUBLIC_SITE_URL}/faq/*" ;;
                src/app/locations/*)      echo "${NEXT_PUBLIC_SITE_URL}/locations"; echo "${NEXT_PUBLIC_SITE_URL}/locations/*" ;;
                src/app/testimonials/*)   echo "${NEXT_PUBLIC_SITE_URL}/testimonials" ;;
                src/app/public-sector/*)  echo "${NEXT_PUBLIC_SITE_URL}/public-sector" ;;
                src/app/resources/*)      echo "${NEXT_PUBLIC_SITE_URL}/resources/*" ;;
                src/app/*/\[\*/*)         echo "${NEXT_PUBLIC_SITE_URL}/*" ;;  # Dynamic routes
                public/robots.txt)        echo "${NEXT_PUBLIC_SITE_URL}/robots.txt" ;;
                public/sitemap*)          echo "${NEXT_PUBLIC_SITE_URL}/sitemap*" ;;
              esac
            done >> /tmp/purge_paths.txt

            # Read unique paths
            if [ -f /tmp/purge_paths.txt ]; then
              PURGE_URLS+=($(sort -u /tmp/purge_paths.txt))
            fi
          fi

          # Add sitemaps and robots (always)
          PURGE_URLS+=(
            "${NEXT_PUBLIC_SITE_URL}/sitemap.xml"
            "${NEXT_PUBLIC_SITE_URL}/sitemap-index.xml"
            "${NEXT_PUBLIC_SITE_URL}/robots.txt"
            "${NEXT_PUBLIC_SITE_URL}/api/*"
          )

          # Remove duplicates
          PURGE_URLS=($(printf '%s\n' "${PURGE_URLS[@]}" | sort -u))

          echo "🧹 Purging ${#PURGE_URLS[@]} paths from Cloudflare cache..."
          echo "📋 Paths to purge:"
          printf '  - %s\n' "${PURGE_URLS[@]}"

          # Convert array to JSON format
          FILES_JSON=$(printf '%s\n' "${PURGE_URLS[@]}" | jq -R . | jq -s .)

          response=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"files\":${FILES_JSON}}")

          success=$(echo "$response" | grep -o '"success":true' || echo "")
          if [ -n "$success" ]; then
            echo "✅ Cache purge completed for $(echo "$FILES_JSON" | jq length) paths"
          else
            echo "⚠️  Cache purge response: $response"
            exit 1
          fi
