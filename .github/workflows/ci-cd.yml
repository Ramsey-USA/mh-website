name: CI/CD Pipeline

# Deployment is handled by Cloudflare Workers auto-deploy (watches main branch).
# This pipeline is a quality gate: type-check, lint, test, and build must all
# pass before code reaches production via Cloudflare Workers.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  NEXT_PUBLIC_SITE_URL: https://www.mhc-gc.com

jobs:
  # Quality Checks + Test Gate
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Detect Lighthouse artifact changes
        id: perf_changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$BASE_SHA" "$GITHUB_SHA" | grep -q '^lighthouse-results/summary\.json$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate Lighthouse summary artifact (strict)
        if: steps.perf_changes.outputs.changed == 'true'
        run: npm run perf:gate

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

      - name: Run tests
        run: npm run test:ci

  # Security Audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: quality-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (fail on high/critical)
        run: npm audit --omit=dev --audit-level=high

  # Build Verification
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    needs: [quality-checks, security-audit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-cache-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            nextjs-cache-${{ hashFiles('**/package-lock.json') }}-
            nextjs-cache-

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
