name: Weekly Platform Health Report

on:
  schedule:
    # Every Friday at 8:00 AM Pacific (15:00 UTC)
    - cron: "0 15 * * 5"
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  BASE_URL: "https://www.mhc-gc.com"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lighthouse:
    name: Run Weekly Platform Digest
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium
          echo "CHROME_PATH=$(which chromium)" >> "$GITHUB_ENV"

      - name: Run Lighthouse on all pages
        run: node scripts/test-lighthouse.js
        env:
          BASE_URL: ${{ env.BASE_URL }}
          LIGHTHOUSE_AUDIT_KEY: ${{ secrets.LIGHTHOUSE_AUDIT_KEY }}
          LH_SKIP_WARMUP: "false"
          LH_RETRY_ON_TRANSIENT: "true"
          LH_INTER_PAGE_DELAY_MS: "2500"
          LH_AUDIT_TIMEOUT_MS: "300000"

      - name: Send weekly platform digest email
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_TO_EMAIL: ${{ secrets.LIGHTHOUSE_REPORT_EMAIL || 'matt@mhc-gc.com' }}
          REPORT_CC_EMAIL: ${{ secrets.LIGHTHOUSE_REPORT_CC_EMAIL || '' }}
          REPORT_FROM_EMAIL: ${{ vars.LIGHTHOUSE_REPORT_FROM_EMAIL || 'office@mhc-gc.com' }}
          BASE_URL: ${{ env.BASE_URL }}
        run: |
          node scripts/monitoring/send-weekly-platform-digest.mjs

      - name: Upload Lighthouse results artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-results-${{ github.run_id }}
          path: lighthouse-results/
          retention-days: 90
