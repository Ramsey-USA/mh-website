name: PR Agent Compliance Reminder

on:
  pull_request:
    branches: [main]
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-compliance-fields:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required agent compliance fields
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;

            if (!pr) {
              core.setFailed("No pull request context found.");
              return;
            }

            if (pr.draft) {
              core.info("Draft PR detected. Skipping agent compliance enforcement until ready for review.");
              return;
            }

            const prAuthor = pr.user?.login || "";
            if (prAuthor === "app/dependabot" || prAuthor === "dependabot[bot]") {
              core.info("Dependabot PR detected. Skipping agent compliance enforcement.");
              return;
            }

            const body = (pr.body || "").replace(/\r/g, "");
            const errors = [];

            const escapeRegex = (value) =>
              value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

            const isChecked = (label) => {
              const re = new RegExp(`- \\[[xX]\\]\\s+${escapeRegex(label)}`);
              return re.test(body);
            };

            const readField = (label) => {
              const re = new RegExp(`^${escapeRegex(label)}\\s*(.*)$`, "im");
              const match = body.match(re);
              return match ? match[1].trim() : "";
            };

            if (!body.trim()) {
              errors.push("PR body is empty. Fill out .github/PULL_REQUEST_TEMPLATE.md sections.");
            }

            const handoffCheckbox =
              "Required agent handoffs completed per .github/AGENT_INVOCATION_MATRIX.md";
            const releaseCheckbox =
              "Release Command readiness result recorded (PASS or FAIL)";

            if (!isChecked(handoffCheckbox)) {
              errors.push(`Checklist item not checked: \"${handoffCheckbox}\".`);
            }

            if (!isChecked(releaseCheckbox)) {
              errors.push(`Checklist item not checked: \"${releaseCheckbox}\".`);
            }

            const invokedAgents = readField("Invoked Agents:");
            const requiredHandoffs = readField("Required Handoffs:");
            const releaseResult = readField("Release Command Result:");

            const isPlaceholder = (value) =>
              /^(|-|none|n\/a|na|tbd|todo)$/i.test(value.trim());

            if (!invokedAgents || isPlaceholder(invokedAgents)) {
              errors.push(
                "Missing or placeholder value for \"Invoked Agents:\". Provide the agents run for this PR.",
              );
            }

            if (!requiredHandoffs || isPlaceholder(requiredHandoffs)) {
              errors.push(
                "Missing or placeholder value for \"Required Handoffs:\". Provide completed handoffs or state why none were required.",
              );
            }

            if (!releaseResult || !/\b(PASS|FAIL)\b/i.test(releaseResult)) {
              errors.push(
                "Missing or invalid \"Release Command Result:\". Must include PASS or FAIL.",
              );
            }

            if (errors.length > 0) {
              core.setFailed(
                [
                  "PR agent compliance reminder failed.",
                  "Resolve the following before merge:",
                  ...errors.map((error) => `- ${error}`),
                ].join("\n"),
              );
              return;
            }

            core.info("PR agent compliance fields validated successfully.");
