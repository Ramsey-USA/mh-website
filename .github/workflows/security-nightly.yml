name: Security Audit (Nightly Strict)

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  HUSKY: "0"

jobs:
  security-audit-strict:
    name: Security Audit (Strict)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --loglevel error

      - name: Run strict dependency security check
        run: npm run security:check:strict
