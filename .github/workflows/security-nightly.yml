name: Security Audit (Nightly Strict)

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  HUSKY: "0"

jobs:
  security-audit-strict:
    name: Security Audit (Strict)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run strict dependency security check
        run: npm run security:check:strict
