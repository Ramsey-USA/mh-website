<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{{RFQ_EXHIBIT_LABEL}} — {{RFQ_PROJECT_NAME}}</title>
    <style>
      @import url("../../styles/brand.css");

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      @page {
        size: letter portrait;
        margin: 0;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 8.5in;
        height: 11in;
        font-family: var(--font-body);
        background: white;
        overflow: hidden;
      }

      .divider-page {
        width: 8.5in;
        height: 11in;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        background: white;
      }

      /* Left-edge bronze accent */
      .spine-accent {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 0.18in;
        background: linear-gradient(
          180deg,
          #a87948 0%,
          #bd9264 50%,
          #a87948 100%
        );
        z-index: 10;
      }

      /* Top bar */
      .top-bar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 0.5in;
        background: #1e392c;
        display: flex;
        align-items: center;
        padding: 0 0.6in;
      }
      .top-bar-text {
        color: #bd9264;
        font-size: 7pt;
        font-weight: 600;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      /* Center content */
      .center-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 0 1.2in;
        z-index: 1;
      }

      /* Logo */
      .logo {
        height: 0.7in;
        width: auto;
        display: block;
        margin-bottom: 0.22in;
        opacity: 0.75;
      }

      .exhibit-id-badge {
        display: inline-block;
        background: #1e392c;
        color: #bd9264;
        font-size: 9pt;
        font-weight: 800;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        padding: 4pt 14pt;
        border-radius: 3pt;
        margin-bottom: 0.16in;
      }

      .divider-rule {
        width: 2.5in;
        height: 2pt;
        background: linear-gradient(
          90deg,
          transparent,
          #a87948,
          #bd9264,
          #a87948,
          transparent
        );
        border-radius: 1pt;
        margin: 0 auto 0.2in;
      }

      .exhibit-label {
        font-size: 22pt;
        font-weight: 900;
        color: #1e392c;
        line-height: 1.1;
        margin-bottom: 0.1in;
      }

      .exhibit-description {
        font-size: 10pt;
        font-weight: 500;
        color: #386851;
        line-height: 1.45;
        max-width: 5in;
        margin-bottom: 0.22in;
      }

      .project-ref {
        font-size: 8pt;
        font-weight: 600;
        color: #8a6b49;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      /* Bottom bar */
      .bottom-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 0.45in;
        background: #1e392c;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 0.6in;
      }
      .bottom-bar-text {
        color: rgba(189, 146, 100, 0.8);
        font-size: 7pt;
        font-weight: 500;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="divider-page">
      <div class="spine-accent"></div>

      <div class="top-bar">
        <span class="top-bar-text"
          >{{BRAND_COMPANY_NAME}} &nbsp;&bull;&nbsp; {{RFQ_PROJECT_NAME}}</span
        >
      </div>

      <div class="center-content">
        <img
          src="{{BRAND_LOGO_COLOR}}"
          class="logo"
          alt="MH Construction, Inc."
        />
        <div class="exhibit-id-badge">{{RFQ_EXHIBIT_ID}}</div>
        <div class="divider-rule"></div>
        <h1 class="exhibit-label">{{RFQ_EXHIBIT_LABEL}}</h1>
        <p class="exhibit-description">{{RFQ_EXHIBIT_DESCRIPTION}}</p>
        <p class="project-ref">
          RFQ Ref: {{RFQ_NUMBER}} &nbsp;&bull;&nbsp; Submitted:
          {{RFQ_SUBMISSION_DATE}}
        </p>
      </div>

      <div class="bottom-bar">
        <span class="bottom-bar-text">
          {{BRAND_ADDRESS}} &nbsp;&bull;&nbsp; {{BRAND_PHONE}}
          &nbsp;&bull;&nbsp; {{BRAND_WEBSITE}}
        </span>
      </div>
    </div>
  </body>
</html>
