<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{{RFQ_SECTION_TITLE}} — {{RFQ_PROJECT_NAME}}</title>
    <style>
      @import url("../../styles/brand.css");

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      /*
       * Header and footer are fully managed by Puppeteer displayHeaderFooter.
       * @page margins reserve space for those injected elements.
       */
      @page {
        size: letter portrait;
        margin: 1in 0.75in 0.9in 1in;
        @top-left {
          content: none;
          border: none;
          padding: 0;
        }
        @top-right {
          content: none;
          border: none;
          padding: 0;
        }
        @bottom-left {
          content: none;
          border: none;
          padding: 0;
        }
        @bottom-right {
          content: none;
          border: none;
          padding: 0;
        }
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family: var(--font-body);
        font-size: 10pt;
        color: #222;
        background: white;
      }

      /* ── Section title band ───────────────────────────────────────────────── */
      .section-title-band {
        border-bottom: 2pt solid #386851;
        padding-bottom: 8pt;
        margin-bottom: 14pt;
      }
      .section-label {
        font-size: 7pt;
        font-weight: 700;
        color: #8a6b49;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        margin-bottom: 3pt;
      }
      .section-title {
        font-size: 18pt;
        font-weight: 900;
        color: #1e392c;
        line-height: 1.1;
        margin: 0;
      }

      /* ── Body content ─────────────────────────────────────────────────────── */
      .section-body {
        line-height: 1.65;
        color: #222;
      }
      .section-body h2 {
        font-size: 13pt;
        font-weight: 800;
        color: #1e392c;
        border-bottom: 1pt solid #e5d5c0;
        padding-bottom: 4pt;
        margin: 16pt 0 8pt;
      }
      .section-body h3 {
        font-size: 11pt;
        font-weight: 700;
        color: #386851;
        margin: 12pt 0 6pt;
      }
      .section-body p {
        margin: 0 0 9pt;
      }
      .section-body ul,
      .section-body ol {
        margin: 0 0 9pt 16pt;
        padding: 0;
      }
      .section-body li {
        margin-bottom: 4pt;
      }

      /* ── TOC table (used for evaluation criteria as TOC) ─────────────────── */
      .toc-table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 14pt;
      }
      .toc-table thead tr {
        background: #1e392c;
        color: #bd9264;
      }
      .toc-table thead th {
        font-size: 7.5pt;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        padding: 5pt 8pt;
        text-align: left;
      }
      .toc-table tbody tr:nth-child(even) {
        background: #f7f3ee;
      }
      .toc-table tbody td {
        font-size: 10pt;
        padding: 5pt 8pt;
        vertical-align: top;
        border-bottom: 0.5pt solid #e5d5c0;
      }
      .toc-table tbody td.toc-num {
        font-weight: 700;
        color: #386851;
        width: 0.4in;
        white-space: nowrap;
      }
      .toc-table tbody td.toc-title {
        font-weight: 600;
        color: #1e392c;
      }
      .toc-table tbody td.toc-page {
        text-align: right;
        width: 0.5in;
        color: #8a6b49;
        font-weight: 600;
      }

      /* ── Info callout box ─────────────────────────────────────────────────── */
      .callout-note {
        background: #f0f7f4;
        border-left: 3pt solid #386851;
        padding: 8pt 10pt;
        margin: 12pt 0;
        font-size: 9pt;
        color: #1e392c;
        border-radius: 0 3pt 3pt 0;
      }
      .callout-note strong {
        color: #386851;
        display: block;
        margin-bottom: 3pt;
        font-size: 7.5pt;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      /* ── Two-column layout ────────────────────────────────────────────────── */
      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.2in;
        margin-bottom: 12pt;
      }
      .col-card {
        background: #f7f3ee;
        border: 1pt solid #e5d5c0;
        border-radius: 4pt;
        padding: 8pt 10pt;
      }
      .col-card-label {
        font-size: 7pt;
        font-weight: 700;
        color: #8a6b49;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-bottom: 4pt;
      }
      .col-card-value {
        font-size: 10pt;
        font-weight: 600;
        color: #1e392c;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <!-- Section title band -->
    <div class="section-title-band">
      <div class="section-label">{{RFQ_SECTION_LABEL}}</div>
      <h1 class="section-title">{{RFQ_SECTION_TITLE}}</h1>
    </div>

    <!-- Section content -->
    <div class="section-body">{{RFQ_SECTION_BODY}}</div>
  </body>
</html>
