<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MH Construction Safety Manual — Spine</title>
    <style>
      :root {
        --brand-primary: {{BRAND_COLOR_PRIMARY}};
        --brand-primary-dark: {{BRAND_COLOR_PRIMARY_DARK}};
        --brand-primary-darker: {{BRAND_COLOR_PRIMARY_DARKER}};
        --brand-secondary: {{BRAND_COLOR_SECONDARY}};
        --brand-secondary-light: {{BRAND_COLOR_SECONDARY_LIGHT}};
        --brand-secondary-text: {{BRAND_COLOR_SECONDARY_TEXT}};
        --ink: #12231b;
        --paper: #ffffff;
        --muted: #f6f8f7;
        --font-body: "DIN 2014", "Helvetica Neue", Arial, "Liberation Sans", sans-serif;
        --font-heading: "Abolition", "Helvetica Neue", Arial, sans-serif;
      }
      *, *::before, *::after {
        box-sizing: border-box;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      @page { size: letter portrait; margin: 0; }
      html, body {
        margin: 0; padding: 0;
        width: 8.5in; height: 11in;
        font-family: var(--font-body);
        background: white;
      }
      .page {
        width: 8.5in; height: 11in;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--muted);
      }
      .crop-area {
        position: relative;
        width: 1.5in;
        height: 10.75in;
      }
      .crop-area::before, .crop-area::after {
        content: "";
        position: absolute;
        top: -0.15in; bottom: -0.15in;
        width: 0;
        border-left: 0.5pt dashed #aaa;
      }
      .crop-area::before { left: -0.12in; }
      .crop-area::after  { right: -0.12in; }
      .crop-h-top, .crop-h-bottom {
        position: absolute;
        left: -0.15in; right: -0.15in;
        height: 0;
        border-top: 0.5pt dashed #aaa;
      }
      .crop-h-top    { top: -0.12in; }
      .crop-h-bottom { bottom: -0.12in; }
      .spine {
        width: 100%; height: 100%;
        background: var(--paper);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        overflow: hidden;
        position: relative;
      }
      .spine::before {
        content: "";
        position: absolute;
        inset: 0.07in;
        border: 1.2pt solid var(--brand-primary-dark);
        z-index: 20;
        pointer-events: none;
      }
      .spine::after {
        content: "";
        position: absolute;
        inset: 0.14in;
        border: 0.6pt solid var(--brand-secondary);
        z-index: 20;
        pointer-events: none;
      }
      .spine-ribbon {
        width: 100%;
        height: 0.28in;
        flex-shrink: 0;
        background: linear-gradient(
          180deg,
          var(--brand-primary-dark) 0%,
          var(--brand-primary)      68%,
          var(--brand-secondary)    100%
        );
        position: relative;
        z-index: 10;
        margin-top: auto;
      }
      .spine-logo-wrap {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.06in;
        padding: 0.24in 0.16in 0.14in;
        flex-shrink: 0;
        position: relative;
        z-index: 1;
      }
      .spine-logo {
        width: 1.08in;
        height: auto;
        display: block;
      }
      .spine-divider {
        width: 1.0in;
        height: 0.8pt;
        background: linear-gradient(90deg, transparent, var(--brand-secondary), transparent);
        flex-shrink: 0;
        margin: 0.06in auto;
        position: relative;
        z-index: 1;
      }
      .spine-text {
        flex: 1;
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.14in;
        position: relative;
        z-index: 1;
        padding: 0.12in 0.02in;
      }
      .spine-title {
        font-family: var(--font-heading);
        font-size: 14pt;
        font-weight: 900;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--brand-primary-dark);
        flex-shrink: 0;
      }
      .spine-rule-sm {
        display: block;
        width: 0.8pt;
        height: 0.6in;
        background: var(--brand-secondary-light);
        flex-shrink: 0;
        align-self: center;
      }
      .spine-company {
        font-size: 7.5pt;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--brand-primary-dark);
        flex-shrink: 0;
      }
      .spine-rule-xs {
        display: block;
        width: 0.8pt;
        height: 0.3in;
        background: color-mix(in srgb, var(--brand-secondary-light) 60%, transparent);
        flex-shrink: 0;
        align-self: center;
      }
      .spine-year {
        font-size: 7.6pt;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--brand-secondary-text);
        flex-shrink: 0;
      }
      .spine-badges {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.16in;
        padding: 0.14in 0;
        flex-shrink: 0;
        position: relative;
        z-index: 1;
      }
      .spine-badge {
        width: 0.58in;
        height: 0.58in;
        object-fit: contain;
        display: block;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="crop-area">
        <div class="crop-h-top"></div>
        <div class="crop-h-bottom"></div>
        <div class="spine">
          <div class="spine-logo-wrap">
            <img
              class="spine-logo"
              src="{{BRAND_LOGO_COLOR}}"
              alt="MH Construction"
            />
            <span class="spine-year">{{BRAND_REVISION_YEAR}}</span>
          </div>

          <div class="spine-divider"></div>

          <div class="spine-text">
            <span class="spine-company">{{BRAND_COMPANY_SHORT}}</span>
            <div class="spine-rule-sm"></div>
            <span class="spine-title">MISH · Accident Prevention Program</span>
          </div>

          <div class="spine-divider"></div>

          <div class="spine-badges">
            <img class="spine-badge" src="{{BRAND_AGC_STACKED}}" alt="AGC" />
            <img class="spine-badge" src="{{BRAND_BBB_SEAL}}" alt="BBB" />
            <img class="spine-badge" src="{{BRAND_WA_VOB_LOGO}}" alt="VOB" />
          </div>

          <div class="spine-divider"></div>

          <div class="spine-ribbon"></div>
        </div>
      </div>
    </div>
  </body>
</html>
