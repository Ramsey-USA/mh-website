<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MH Construction, Inc. — Safety Manual Spine</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      @page {
        size: letter portrait;
        margin: 0;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 8.5in;
        height: 11in;
        font-family: "Helvetica Neue", Arial, "Liberation Sans", sans-serif;
        background: white;
      }
      .page {
        width: 8.5in;
        height: 11in;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8f5f0;
      }
      /* 1.5in × 10.75in — fits a standard 1.5" binder spine pocket */
      .crop-area {
        position: relative;
        width: 1.5in;
        height: 10.75in;
      }
      .crop-area::before,
      .crop-area::after {
        content: "";
        position: absolute;
        top: -0.15in;
        bottom: -0.15in;
        width: 0;
        border-left: 0.5pt dashed #aaa;
      }
      .crop-area::before {
        left: -0.12in;
      }
      .crop-area::after {
        right: -0.12in;
      }
      .crop-h-top,
      .crop-h-bottom {
        position: absolute;
        left: -0.15in;
        right: -0.15in;
        height: 0;
        border-top: 0.5pt dashed #aaa;
      }
      .crop-h-top {
        top: -0.12in;
      }
      .crop-h-bottom {
        bottom: -0.12in;
      }
      .spine {
        width: 100%;
        height: 100%;
        background: #386851;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding: 0.15in 0;
        overflow: hidden;
        position: relative;
      }
      .spine::before {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          -45deg,
          rgba(255, 255, 255, 0.02) 0px,
          rgba(255, 255, 255, 0.02) 1px,
          transparent 1px,
          transparent 6px
        );
        pointer-events: none;
      }
      /* writing-mode + rotate(180deg) = text reads bottom-to-top on shelf */
      .spine-content {
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        height: 100%;
        padding: 0.15in 0;
        position: relative;
        z-index: 1;
      }
      .spine-logo {
        height: 0.82in;
        width: auto;
        flex-shrink: 0;
        filter: brightness(0) invert(1);
      }
      .spine-agc {
        height: 0.42in;
        width: auto;
        flex-shrink: 0;
        filter: brightness(0) invert(1) opacity(0.85);
      }
      .spine-rule {
        width: 1.5pt;
        flex: 0 0 0.12in;
        background: rgba(189, 146, 100, 0.6);
        align-self: stretch;
        margin: 0 auto;
      }
      .spine-rule2 {
        width: 1.5pt;
        flex: 0 0 0.06in;
        background: rgba(189, 146, 100, 0.35);
        align-self: stretch;
        margin: 0 auto;
      }
      .spine-title {
        color: white;
        font-size: 13pt;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        flex-shrink: 0;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
      }
      .spine-company {
        color: #bd9264;
        font-size: 7.5pt;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        flex-shrink: 0;
      }
      .spine-year {
        color: rgba(255, 255, 255, 0.45);
        font-size: 7pt;
        letter-spacing: 0.05em;
        flex-shrink: 0;
      }
    </style>
  </head>
