<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MH Construction Safety Manual — Spine</title>
    <style>
      /* ── Brand CSS variables — matches cover template token naming ── */
      :root {
        --brand-primary: {{BRAND_COLOR_PRIMARY}};
        --brand-primary-dark: {{BRAND_COLOR_PRIMARY_DARK}};
        --brand-primary-darker: {{BRAND_COLOR_PRIMARY_DARKER}};
        --brand-secondary: {{BRAND_COLOR_SECONDARY}};
        --brand-secondary-light: {{BRAND_COLOR_SECONDARY_LIGHT}};
        --brand-secondary-text: {{BRAND_COLOR_SECONDARY_TEXT}};
        --ink: #12231b;
        --paper: #ffffff;
        --muted: #f6f8f7;
        --font-body: "DIN 2014", "Helvetica Neue", Arial, "Liberation Sans", sans-serif;
        --font-heading: "Abolition", "Helvetica Neue", Arial, sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      @page {
        size: letter portrait;
        margin: 0;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 8.5in;
        height: 11in;
        font-family: var(--font-body);
        background: white;
      }
      .page {
        width: 8.5in;
        height: 11in;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--muted);
      }
      /* 1.5in × 10.75in — fits a standard 1.5" binder spine pocket */
      .crop-area {
        position: relative;
        width: 1.5in;
        height: 10.75in;
      }
      .crop-area::before,
      .crop-area::after {
        content: "";
        position: absolute;
        top: -0.15in;
        bottom: -0.15in;
        width: 0;
        border-left: 0.5pt dashed #aaa;
      }
      .crop-area::before {
        left: -0.12in;
      }
      .crop-area::after {
        right: -0.12in;
      }
      .crop-h-top,
      .crop-h-bottom {
        position: absolute;
        left: -0.15in;
        right: -0.15in;
        height: 0;
        border-top: 0.5pt dashed #aaa;
      }
      .crop-h-top {
        top: -0.12in;
      }
      .crop-h-bottom {
        bottom: -0.12in;
      }
      .spine {
        width: 100%;
        height: 100%;
        background: var(--brand-primary-dark);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding: 0.15in 0;
        overflow: hidden;
        position: relative;
      }
      /* Green border frame */
      .spine::before {
        content: "";
        position: absolute;
        inset: 0.04in;
        border: 0.07in solid var(--brand-primary-dark);
        z-index: 20;
        pointer-events: none;
      }
      /* Tan inner edge */
      .spine::after {
        content: "";
        position: absolute;
        inset: 0.1in;
        border: 0.02in solid var(--brand-secondary-light);
        z-index: 20;
        pointer-events: none;
      }
      /* writing-mode + rotate(180deg) = text reads bottom-to-top on shelf */
      .spine-content {
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        height: 100%;
        padding: 0.22in 0;
        position: relative;
        z-index: 1;
      }
      .spine-logo {
        height: 0.6in;
        width: auto;
        flex-shrink: 0;
      }
      .spine-agc {
        height: 0.42in;
        width: auto;
        flex-shrink: 0;
      }
      .spine-vob {
        height: 0.44in;
        width: auto;
        flex-shrink: 0;
      }
      .spine-bbb {
        height: 0.48in;
        width: auto;
        flex-shrink: 0;
      }
      .spine-rule {
        width: 1.5pt;
        flex: 0 0 0.12in;
        background: var(--brand-secondary-light);
        align-self: stretch;
        margin: 0 auto;
      }
      .spine-rule2 {
        width: 1.5pt;
        flex: 0 0 0.06in;
        background: color-mix(in srgb, var(--brand-secondary-light) 50%, transparent);
        align-self: stretch;
        margin: 0 auto;
      }
      .spine-title {
        color: white;
        font-family: var(--font-heading);
        font-size: 13.5pt;
        font-weight: 900;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        flex-shrink: 0;
        text-shadow: none;
      }
      .spine-company {
        color: var(--brand-secondary-light);
        font-size: 7.5pt;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        flex-shrink: 0;
      }
      .spine-year {
        color: rgba(255, 255, 255, 0.7);
        font-size: 7pt;
        font-weight: 500;
        letter-spacing: 0.06em;
        flex-shrink: 0;
      }
    </style>
  </head>
