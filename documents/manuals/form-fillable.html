<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{FORM_ID}} — {{FORM_TITLE}}</title>
    <style>
      :root {
        --brand-primary: {{BRAND_COLOR_PRIMARY}};
        --brand-primary-dark: {{BRAND_COLOR_PRIMARY_DARK}};
        --brand-primary-darker: {{BRAND_COLOR_PRIMARY_DARKER}};
        --brand-primary-light: {{BRAND_COLOR_PRIMARY_LIGHT}};
        --brand-secondary: {{BRAND_COLOR_SECONDARY}};
        --brand-secondary-light: {{BRAND_COLOR_SECONDARY_LIGHT}};
        --brand-secondary-text: {{BRAND_COLOR_SECONDARY_TEXT}};
        --ink: #12231b;
        --paper: #ffffff;
        --muted: #f6f8f7;
        --font-heading: "mendl-sans-dusk", "Mendl Sans Dusk", "Abolition", "Helvetica Neue", Arial, sans-serif;
        --font-body: "DIN 2014", "Helvetica Neue", Arial, "Liberation Sans",
          sans-serif;
      }

      *, *::before, *::after {
        box-sizing: border-box;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      @page { size: letter portrait; margin: 0; }

      html, body {
        margin: 0; padding: 0; width: 8.5in;
        font-family: var(--font-body);
        background: var(--paper); color: var(--ink);
      }

      /* ── Sheet (chrome host) ─────────────────────────────────── */
      .sheet {
        position: relative;
        width: 8.5in;
        min-height: 11in;
        background: var(--paper);
      }
      .sheet::before {
        content: "";
        position: absolute;
        top: 0.22in; left: 0.22in; right: 0.22in;
        height: 10.56in;
        border: 1.2pt solid var(--brand-primary-dark);
        pointer-events: none;
      }
      .sheet::after {
        content: "";
        position: absolute;
        top: 0.33in; left: 0.33in; right: 0.33in;
        height: 10.34in;
        border: 0.6pt solid var(--brand-secondary);
        pointer-events: none;
      }
      .left-ribbon {
        position: absolute;
        top: 0.45in; left: 0.45in;
        height: 10.10in; width: 0.28in;
        background: linear-gradient(
          180deg,
          var(--brand-primary-dark) 0%,
          var(--brand-primary) 68%,
          var(--brand-secondary) 100%
        );
      }

      /* ── Page-1 identity row + header ─────────────────────────── */
      .identity {
        position: absolute;
        top: 0.62in; left: 0.92in; right: 0.9in;
        display: flex; justify-content: space-between; align-items: center;
        font-size: 7.2pt; font-weight: 700;
        letter-spacing: 0.11em; text-transform: uppercase;
        color: var(--brand-primary-dark);
      }
      .identity .dot { color: var(--brand-secondary); margin: 0 7pt; }

      .header {
        position: absolute;
        top: 0.95in; left: 0.92in; right: 0.9in;
        display: flex; justify-content: space-between; align-items: center;
        padding-bottom: 14pt;
        border-bottom: 1.2pt solid var(--brand-primary-dark);
      }
      .header::after {
        content: "";
        position: absolute;
        left: 0; right: 0; bottom: -3.5pt;
        height: 0.6pt;
        background: var(--brand-secondary);
      }
      .header .logo { width: 1.82in; height: auto; display: block; }
      .header .form-id-card {
        text-align: right;
        font-family: var(--font-body);
        color: var(--brand-primary-darker);
      }
      .header .form-id-card .form-id {
        font-family: var(--font-heading);
        font-size: 16pt; font-weight: 900;
        letter-spacing: 0.04em; color: var(--brand-primary-dark);
        line-height: 1.0;
      }
      .header .form-id-card .form-title {
        font-size: 9.5pt; font-weight: 800;
        letter-spacing: 0.04em; text-transform: uppercase;
        color: var(--brand-primary-darker);
        margin-top: 3pt;
      }
      .header .form-id-card .form-meta {
        margin-top: 3pt;
        font-size: 7pt; letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--brand-secondary-text);
        font-weight: 700;
      }

      /* ── Body region ────────────────────────────────────────── */
      .body-area {
        position: absolute;
        top: 2.55in;
        left: 0.92in; right: 0.9in;
        bottom: 1.75in;
        z-index: 1;
        font-family: var(--font-body);
        color: var(--ink);
      }

      .sec-band {
        font-family: var(--font-heading);
        font-size: 9.5pt;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #fff;
        background: var(--brand-primary-dark);
        padding: 3pt 7pt;
        margin: 8pt 0 5pt;
      }
      .sec-band:first-child { margin-top: 0; }
      .sec-band .sec-sub {
        color: var(--brand-secondary);
        font-weight: 700;
        margin-left: 6pt;
        letter-spacing: 0.06em;
      }

      .ref-note {
        font-size: 7.6pt;
        color: var(--brand-primary-darker);
        background: var(--muted);
        border-left: 2pt solid var(--brand-secondary);
        padding: 4pt 7pt;
        margin-bottom: 6pt;
        line-height: 1.35;
      }

      .field-label {
        font-size: 6.4pt;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: var(--brand-secondary-text);
        opacity: 0.55;
        margin-bottom: 2pt;
        display: block;
      }

      .field-grid {
        display: grid;
        gap: 5pt 12pt;
        margin-bottom: 5pt;
      }
      .field-grid.cols-1 { grid-template-columns: 1fr; }
      .field-grid.cols-2 { grid-template-columns: 1fr 1fr; }
      .field-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
      .field-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
      .field-grid.cols-6 { grid-template-columns: repeat(6, 1fr); }

      .field-cell {
        position: relative;
        padding: 0 2pt 0;
      }
      .field-cell::after {
        content: "";
        position: absolute;
        left: 0; right: 0; bottom: 0;
        height: 0;
        border-bottom: 0.7pt solid var(--brand-primary-dark);
      }
      .field-cell .field-line-stub { height: 0.22in; }

      .check-grid {
        display: grid;
        gap: 4pt 10pt;
        margin: 3pt 0 6pt;
      }
      .check-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
      .check-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
      .check-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
      .check-grid.cols-6 { grid-template-columns: repeat(6, 1fr); }
      .check-cell {
        display: flex;
        align-items: center;
        gap: 6pt;
        font-size: 8pt;
        color: var(--brand-primary-darker);
      }
      .check-box {
        display: inline-block;
        width: 9pt; height: 9pt;
        background: transparent;
        flex-shrink: 0;
      }

      .data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 7.8pt;
        margin: 3pt 0 5pt;
      }
      .data-table th {
        background: var(--brand-primary-dark);
        color: #fff;
        font-size: 7pt;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-weight: 800;
        padding: 3pt 5pt;
        text-align: left;
        border: 0.5pt solid var(--brand-primary-dark);
      }
      .data-table td {
        border: 0.5pt solid var(--brand-secondary-light);
        padding: 0;
        height: 0.30in;
        vertical-align: middle;
      }
      .data-table td.tcell { padding: 2pt 4pt; }
      .data-table td.tcheck { text-align: center; width: 0.5in; }

      .narrative-cell {
        position: relative;
        border: 0.5pt solid var(--brand-secondary-light);
        background: var(--muted);
        margin-top: 2pt;
      }

      .sig-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8pt 14pt;
        margin-top: 6pt;
      }
      .sig-cell {
        border: 0.5pt solid var(--brand-secondary-light);
        padding: 5pt 7pt 7pt;
      }
      .sig-cell.sig-wide { grid-column: 1 / span 2; }
      .sig-cell .sig-role {
        font-family: var(--font-heading);
        font-size: 9pt;
        font-weight: 900;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--brand-primary-dark);
        margin-bottom: 4pt;
      }
      .sig-cell .sig-line {
        height: 0.32in;
        border-bottom: 0.7pt solid var(--brand-primary-dark);
        margin-bottom: 4pt;
      }
      .sig-cell .sig-meta {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 8pt;
      }
      .sig-cell .sig-meta .field-cell { padding-bottom: 12pt; }

      /* ── Footer (every page) ─────────────────────────────── */
      .footer {
        position: absolute;
        left: 0.92in; right: 0.9in;
        bottom: 0.62in;
        padding-top: 7pt;
        border-top: 1.2pt solid var(--brand-primary-dark);
        display: grid;
        grid-template-columns: 1.45fr 1fr;
        gap: 0.20in;
        align-items: end;
        z-index: 2;
      }
      .footer::before {
        content: "";
        position: absolute;
        left: 0; right: 0; top: 2.5pt;
        height: 0.6pt;
        background: var(--brand-secondary);
      }
      .footer .contact { font-size: 7.4pt; line-height: 1.40; color: var(--brand-primary-darker); }
      .footer .contact .label {
        color: var(--brand-secondary-text);
        font-size: 6.4pt;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        font-weight: 800;
        margin-bottom: 2pt;
      }
      .footer .contact .name {
        font-weight: 800;
        color: var(--brand-primary-dark);
        font-size: 8pt;
      }
      .footer .licenses {
        margin-top: 3pt;
        font-size: 7pt;
        color: var(--brand-secondary-text);
        font-weight: 700;
      }
      .footer .trust { text-align: right; }
      .footer .trust .label {
        color: var(--brand-secondary-text);
        font-size: 6.4pt;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        font-weight: 800;
        margin-bottom: 4pt;
      }
      .footer .logos {
        display: flex; justify-content: flex-end;
        align-items: flex-end; gap: 8pt;
      }
      .footer .logos img { display: block; width: auto; }
      .logo-agc { height: 0.32in; }
      .logo-bbb { height: 0.34in; }
      .logo-vob { height: 0.44in; }
      .footer .chambers {
        margin-top: 5pt;
        display: flex; justify-content: flex-end;
        align-items: center; gap: 9pt;
        padding-top: 5pt;
        border-top: 0.4pt solid var(--brand-secondary-light);
      }
      .footer .chambers img { display: block; width: auto; height: 0.26in; }

      .veteran-strip {
        position: absolute;
        left: 0.92in; right: 0.9in;
        bottom: 0.42in;
        text-align: center;
        font-size: 6.6pt;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        font-weight: 800;
        color: var(--brand-secondary-text);
        z-index: 2;
      }
      .veteran-strip .sep { color: var(--brand-secondary); margin: 0 6pt; }

      /* ── Continuation page (page 2+) ──────────────────────── */
      .sheet--cont { page-break-before: always; break-before: page; }
      .sheet--cont .cont-header {
        position: absolute;
        top: 0.62in; left: 0.92in; right: 0.9in;
        display: flex; justify-content: space-between; align-items: flex-end;
        padding-bottom: 9pt;
        border-bottom: 1.2pt solid var(--brand-primary-dark);
        font-size: 7.6pt; font-weight: 700;
        letter-spacing: 0.11em; text-transform: uppercase;
        color: var(--brand-primary-dark);
      }
      .sheet--cont .cont-header::after {
        content: "";
        position: absolute;
        left: 0; right: 0; bottom: -3.5pt;
        height: 0.6pt;
        background: var(--brand-secondary);
      }
      .sheet--cont .cont-header .cont-mark {
        font-family: var(--font-heading);
        font-size: 11pt; font-weight: 900;
        letter-spacing: 0.05em;
        color: var(--brand-primary-dark);
      }
      .sheet--cont .cont-header .cont-mark .dot {
        color: var(--brand-secondary); margin: 0 7pt;
      }
      .sheet--cont .cont-header .cont-page { color: var(--brand-secondary-text); }
      .sheet--cont .body-area { top: 1.10in; }
    </style>
  </head>
  <body>
    {{FORM_BODY}}
  </body>
</html>
