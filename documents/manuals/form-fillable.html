<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{FORM_ID}} — {{FORM_TITLE}}</title>
    <style>
      :root {
        --brand-primary: {{BRAND_COLOR_PRIMARY}};
        --brand-primary-dark: {{BRAND_COLOR_PRIMARY_DARK}};
        --brand-primary-darker: {{BRAND_COLOR_PRIMARY_DARKER}};
        --brand-primary-light: {{BRAND_COLOR_PRIMARY_LIGHT}};
        --brand-secondary: {{BRAND_COLOR_SECONDARY}};
        --brand-secondary-light: {{BRAND_COLOR_SECONDARY_LIGHT}};
        --brand-secondary-text: {{BRAND_COLOR_SECONDARY_TEXT}};
        --ink: #12231b;
        --paper: #ffffff;
        --muted: #f6f8f7;
        --icon-material-info: "info";
        --icon-material-danger-outline: "error_outline";
        --icon-material-warning: "warning";
        --icon-material-caution: "gpp_maybe";
        --icon-material-checkbox-empty: "check_box_outline_blank";
        --icon-material-checklist: "fact_check";
        --icon-material-form-field: "edit_note";
        --icon-material-narrative: "description";
        --icon-material-table: "table_chart";
        --icon-material-signature: "draw";
        --icon-material-route: "route";
        --icon-material-access: "verified_user";
        --icon-material-source: "menu_book";
        --icon-material-local-dev: "dns";
        --font-heading: "mendl-sans-dusk", "Mendl Sans Dusk", sans-serif;
        --font-body: "mendl-sans-dusk", "Mendl Sans Dusk", sans-serif;
      }

      /*
       * Author cheat sheet — canonical section icon usage
       * checkGrid  -> checklist (fact_check)
       * fieldGrid  -> formField (edit_note)
       * narrative  -> narrative (description)
       * dataTable/regTable -> table (table_chart)
       * signatures -> signature (draw)
       * Optional schema override: section.icon = canonical key (or ligature)
       */

      *, *::before, *::after {
        box-sizing: border-box;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      @page { size: letter portrait; margin: 0; }

      html, body {
        margin: 0; padding: 0; width: 8.5in;
        font-family: var(--font-body);
        background: var(--paper); color: var(--ink);
      }

      .material-icons,
      .mi {
        font-family: "Material Icons", sans-serif;
        font-weight: 400;
        font-style: normal;
        font-size: 1em;
        display: inline-block;
        line-height: 1;
        text-transform: none;
        letter-spacing: normal;
        word-wrap: normal;
        white-space: nowrap;
        direction: ltr;
        vertical-align: -0.125em;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: "liga";
      }

      .mi-inline {
        font-size: 1em;
        vertical-align: -0.125em;
      }

      /* ── Sheet (chrome host) ─────────────────────────────────── */
      .sheet {
        position: relative;
        width: 8.5in;
        min-height: 11in;
        background: var(--paper);
      }
      .sheet::before {
        content: "";
        position: absolute;
        top: 0.22in; left: 0.22in; right: 0.22in;
        height: 10.56in;
        border: 1.2pt solid var(--brand-primary);
        pointer-events: none;
      }
      .sheet::after {
        content: "";
        position: absolute;
        top: 0.33in; left: 0.33in; right: 0.33in;
        height: 10.34in;
        border: 0.6pt solid var(--brand-secondary);
        pointer-events: none;
      }
      .left-ribbon {
        position: absolute;
        top: 0.45in; left: 0.45in;
        height: 10.10in; width: 0.28in;
        background: linear-gradient(
          180deg,
          var(--brand-primary) 0%,
          var(--brand-primary) 68%,
          var(--brand-secondary) 100%
        );
      }

      /* ── Page-1 identity row + header ─────────────────────────── */
      .identity {
        position: absolute;
        top: 0.62in; left: 0.92in; right: 0.9in;
        display: flex; justify-content: space-between; align-items: center;
        font-size: 7.2pt; font-weight: 700;
        letter-spacing: 0.11em; text-transform: uppercase;
        color: var(--brand-primary);
      }
      .identity .dot { color: var(--brand-secondary); margin: 0 7pt; }

      .header {
        position: absolute;
        top: 0.95in; left: 0.92in; right: 0.9in;
        display: flex; justify-content: space-between; align-items: center;
        padding-bottom: 14pt;
        border-bottom: 1.2pt solid var(--brand-primary);
      }
      .header::after {
        content: "";
        position: absolute;
        left: 0; right: 0; bottom: -3.5pt;
        height: 0.6pt;
        background: var(--brand-secondary);
      }
      .header .logo { width: 1.82in; height: auto; display: block; }
      .header .qr-card {
        display: flex;
        align-items: center;
        gap: 9pt;
        border: 0.8pt solid var(--brand-secondary);
        background: #fff;
        padding: 7pt 10pt;
      }
      .header .qr-card img {
        width: 0.78in;
        height: 0.78in;
        display: block;
      }
      .header .qr-card .qr-text {
        text-align: left;
        max-width: 1.95in;
      }
      .header .qr-card .qr-label {
        font-size: 6.8pt;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--brand-secondary);
        margin: 0 0 2pt;
      }
      .header .qr-card .qr-headline {
        font-family: var(--font-heading);
        font-size: 10.6pt;
        font-weight: 900;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--brand-primary);
        line-height: 1.05;
      }
      .header .qr-card .qr-meta {
        margin-top: 2pt;
        font-size: 7.2pt;
        color: var(--brand-primary-darker);
        letter-spacing: 0.02em;
        line-height: 1.2;
      }
      .header .qr-card .form-context {
        margin-top: 6pt;
        display: inline-block;
        font-family: var(--font-heading);
        font-size: 6.4pt;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--brand-secondary-text);
        background: linear-gradient(90deg, rgba(56, 104, 81, 0.08), rgba(189, 146, 100, 0.14));
        border-left: 2pt solid var(--brand-secondary);
        border-radius: 2pt;
        padding: 2pt 6pt 2pt;
      }

      /* ── Body region ────────────────────────────────────────── */
      .body-area {
        position: absolute;
        top: 2.55in;
        left: 1.15in;
        right: 1.05in;
        bottom: 2.10in;
        z-index: 1;
        font-family: var(--font-body);
        color: var(--ink);
      }
      .body-area--split {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .body-main,
      .body-bottom {
        display: block;
      }

      .sec-band {
        display: flex;
        align-items: center;
        gap: 5pt;
        font-family: var(--font-heading);
        font-size: 9.5pt;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #fff;
        background: var(--brand-primary);
        border-left: 3pt solid var(--brand-secondary);
        box-shadow: inset 0 -1pt 0 var(--brand-secondary);
        padding: 3pt 7pt 3pt 6pt;
        margin: 8pt 0 5pt;
      }
      .sec-band:first-child { margin-top: 0; }
      .sec-band .sec-band-icon {
        display: inline-flex;
        align-items: center;
        line-height: 1;
      }
      .sec-band .sec-band-icon .mi {
        font-size: 10pt;
        color: var(--brand-secondary-light);
        vertical-align: -0.08em;
      }
      .sec-band .sec-sub {
        color: var(--brand-secondary);
        font-weight: 700;
        margin-left: 6pt;
        letter-spacing: 0.06em;
      }

      .ref-note {
        display: flex;
        align-items: flex-start;
        gap: 5pt;
        font-size: 7.6pt;
        color: var(--brand-primary-darker);
        background: var(--muted);
        border-left: 2pt solid var(--brand-secondary);
        padding: 4pt 7pt;
        margin-bottom: 6pt;
        line-height: 1.35;
      }
      .ref-note .ref-note-icon {
        flex: 0 0 auto;
        color: var(--brand-secondary-text);
        line-height: 1;
      }
      .ref-note .ref-note-icon .mi {
        font-size: 9pt;
        vertical-align: -0.08em;
      }
      .ref-note .ref-note-content {
        flex: 1;
      }
      .ref-note .ref-note-content > *:first-child { margin-top: 0; }
      .ref-note .ref-note-content > *:last-child { margin-bottom: 0; }
      .ref-note.ref-note-tight-top {
        padding-top: 0;
        margin-top: -8pt;
      }

      .field-label {
        font-size: 6.4pt;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: var(--brand-secondary);
        opacity: 0.32;
        margin-bottom: 2pt;
        display: block;
      }

      .field-grid {
        display: grid;
        gap: 4pt 10pt;
        margin-bottom: 4pt;
      }
      .field-grid.cols-1 { grid-template-columns: 1fr; }
      .field-grid.cols-2 { grid-template-columns: 1fr 1fr; }
      .field-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
      .field-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
      .field-grid.cols-6 { grid-template-columns: repeat(6, 1fr); }

      .field-cell {
        position: relative;
        padding: 0 2pt 0;
      }
      .field-cell::after {
        content: "";
        position: absolute;
        left: 0; right: 0; bottom: 0;
        height: 0;
        border-bottom: 0.7pt solid var(--brand-secondary);
      }
      .field-cell .field-line-stub { height: 0.18in; }

      .check-grid {
        display: grid;
        gap: 3pt 8pt;
        margin: 2pt 0 5pt;
      }
      .check-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
      .check-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
      .check-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
      .check-grid.cols-6 { grid-template-columns: repeat(6, 1fr); }
      .check-cell {
        display: flex;
        align-items: center;
        gap: 6pt;
        font-size: 8pt;
        color: var(--brand-primary-darker);
      }
      .check-box {
        display: inline-block;
        width: 9pt; height: 9pt;
        background: transparent;
        flex-shrink: 0;
        color: var(--brand-secondary-text);
        line-height: 1;
      }
      .check-box::before {
        content: var(--icon-material-checkbox-empty);
        display: block;
        font-family: "Material Icons", sans-serif;
        font-style: normal;
        font-weight: 400;
        font-size: 9pt;
        line-height: 1;
        text-transform: none;
        letter-spacing: normal;
        white-space: nowrap;
        direction: ltr;
        font-feature-settings: "liga";
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        -moz-osx-font-smoothing: grayscale;
      }
      td.tcheck::before {
        content: var(--icon-material-checkbox-empty);
        display: inline-block;
        font-family: "Material Icons", sans-serif;
        font-style: normal;
        font-weight: 400;
        font-size: 9pt;
        line-height: 1;
        text-transform: none;
        letter-spacing: normal;
        white-space: nowrap;
        direction: ltr;
        font-feature-settings: "liga";
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        -moz-osx-font-smoothing: grayscale;
        color: var(--brand-secondary-text);
        vertical-align: -0.08em;
      }

      .data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 7.4pt;
        margin: 2pt 0 4pt;
      }
      .data-table th {
        background: var(--brand-primary);
        color: #fff;
        font-size: 7pt;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-weight: 800;
        padding: 2pt 4pt;
        text-align: left;
        border: 0.5pt solid var(--brand-primary);
      }
      .data-table td {
        border: 0.5pt solid var(--brand-secondary);
        padding: 0;
        height: 0.24in;
        vertical-align: middle;
      }
      .data-table td.tcell { padding: 2pt 4pt; }
      .data-table td.tcheck { text-align: center; width: 0.5in; }

      .narrative-cell {
        position: relative;
        border: 0.5pt solid var(--brand-secondary);
        background: var(--muted);
        margin-top: 2pt;
      }

      .docx-block {
        margin: 3pt 0 6pt;
        padding: 6pt 7pt;
        border: 0.5pt solid var(--brand-secondary);
        background: #fff;
        font-size: 7.2pt;
        line-height: 1.32;
        color: var(--brand-primary-darker);
        max-height: 2.75in;
        overflow: hidden;
      }
      .docx-block h4 {
        margin: 0 0 4pt;
        font-size: 7.4pt;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--brand-primary);
      }
      .docx-block p {
        margin: 0 0 4pt;
      }
      .docx-block ul,
      .docx-block ol {
        margin: 0 0 4pt;
        padding-left: 14pt;
      }
      .docx-block table {
        width: 100%;
        border-collapse: collapse;
        margin: 3pt 0 4pt;
      }
      .docx-block th,
      .docx-block td {
        border: 0.5pt solid var(--brand-secondary);
        padding: 2pt 3pt;
        vertical-align: top;
      }

      .sig-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8pt;
        margin-top: 6pt;
      }
      .sig-grid--two-up {
        grid-template-columns: 1fr 1fr;
        gap: 8pt 10pt;
      }
      .sig-cell {
        width: auto;
        border: 0.75pt solid #d7e3dc;
        border-radius: 4pt;
        padding: 8pt 12pt;
        background: #f6f8f7;
        box-sizing: border-box;
      }
      .sig-cell.sig-wide { grid-column: 1 / span 1; }
      .sig-cell .sig-label {
        font-size: 6.4pt;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--brand-secondary);
        font-weight: 800;
        text-align: center;
        margin-bottom: 7pt;
        padding-bottom: 4pt;
        border-bottom: 0.5pt solid var(--brand-secondary);
      }
      .sig-cell .sig-role {
        font-size: 8.2pt;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--brand-primary);
        margin-bottom: 8pt;
      }
      .sig-cell .sig-lines {
        display: grid;
        grid-template-columns: 1.5fr 0.85fr;
        gap: 12pt;
      }
      .sig-cell .sig-line-pair {
        display: flex;
        flex-direction: column;
        gap: 3pt;
      }
      .sig-cell .sig-lines .field-line-stub {
        height: 0.18in;
        border-bottom: 1pt solid var(--brand-primary);
      }
      .sig-cell .sig-field-label {
        font-size: 6pt;
        color: var(--brand-secondary);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 700;
      }

      /* ── Footer (every page) ─────────────────────────────── */
      .footer {
        position: absolute;
        left: 0.92in; right: 0.9in;
        bottom: 0.62in;
        padding-top: 9pt;
        border-top: 1.2pt solid var(--brand-primary);
        display: grid;
        grid-template-columns: 1.45fr 1fr;
        gap: 0.25in;
        align-items: end;
        z-index: 2;
      }
      .footer::before {
        content: "";
        position: absolute;
        left: 0; right: 0; top: 2.5pt;
        height: 0.6pt;
        background: var(--brand-secondary);
      }
      .footer .contact { font-size: 7.8pt; line-height: 1.45; color: var(--brand-primary-darker); }
      .footer .contact .label {
        color: var(--brand-secondary);
        font-size: 6.6pt;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        font-weight: 800;
        margin-bottom: 3pt;
      }
      .footer .contact .name {
        font-weight: 800;
        color: var(--brand-primary);
        font-size: 8.2pt;
      }
      .footer .licenses {
        margin-top: 4pt;
        font-size: 7.2pt;
        color: var(--brand-secondary);
        font-weight: 700;
      }
      .footer .trust { text-align: right; }
      .footer .trust .label {
        color: var(--brand-secondary);
        font-size: 6.6pt;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        font-weight: 800;
        margin-bottom: 5pt;
      }
      .footer .logos {
        display: flex; justify-content: flex-end;
        align-items: flex-end; gap: 9pt;
      }
      .footer .logos img { display: block; width: auto; }
      .logo-agc { height: 0.36in; }
      .logo-bbb { height: 0.39in; }
      .logo-vob { height: 0.5in; }
      .footer .chambers {
        margin-top: 6pt;
        display: flex; justify-content: flex-end;
        align-items: center; gap: 10pt;
        padding-top: 6pt;
        border-top: 0.4pt solid var(--brand-secondary);
      }
      .footer .chambers img { display: block; width: auto; height: 0.3in; }

      .veteran-strip {
        position: absolute;
        left: 0.92in; right: 0.9in;
        bottom: 0.42in;
        text-align: center;
        font-size: 6.6pt;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        font-weight: 800;
        color: var(--brand-secondary);
        z-index: 2;
      }
      .veteran-strip .sep { color: var(--brand-secondary); margin: 0 6pt; }

      /* ── Continuation page (page 2+) ──────────────────────── */
      .sheet--cont { page-break-before: always; break-before: page; }
      .sheet--cont .cont-header {
        position: absolute;
        top: 0.62in; left: 0.92in; right: 0.9in;
        display: flex; justify-content: space-between; align-items: flex-end;
        padding-bottom: 9pt;
        border-bottom: 1.2pt solid var(--brand-primary);
        font-size: 7.6pt; font-weight: 700;
        letter-spacing: 0.11em; text-transform: uppercase;
        color: var(--brand-primary);
      }
      .sheet--cont .cont-header::after {
        content: "";
        position: absolute;
        left: 0; right: 0; bottom: -3.5pt;
        height: 0.6pt;
        background: var(--brand-secondary);
      }
      .sheet--cont .cont-header .cont-mark {
        font-family: var(--font-heading);
        font-size: 11pt; font-weight: 900;
        letter-spacing: 0.05em;
        color: var(--brand-primary);
      }
      .sheet--cont .cont-header .cont-mark .dot {
        color: var(--brand-secondary); margin: 0 7pt;
      }
      .sheet--cont .cont-header .cont-page { color: var(--brand-secondary); }
      .sheet--cont .body-area {
        top: 1.10in;
        left: 1.15in;
        right: 1.05in;
        bottom: 2.10in;
      }
    </style>
  </head>
  <body>
    {{FORM_BODY}}
  </body>
</html>
