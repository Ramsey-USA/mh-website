<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MISH Program Table of Contents</title>
    <!--
      Template tokens substituted at build time by generate.mjs:
        {{BRAND_LOGO_COLOR}}        → base64 data-URI of logo-color.png
        {{BRAND_COLOR_PRIMARY}}     → #386851 Hunter Green
        {{BRAND_COLOR_SECONDARY}}   → #BD9264 Tan Leather
        {{BRAND_COMPANY_NAME}}      → MH Construction, Inc.
        {{BRAND_REVISION_NUMBER}}   → 3
        {{BRAND_REVISION_DATE}}     → 04/07/2026
        {{TOC_CLUSTERS_HTML}}       → generated dynamically from safety-manual.json
                                      (see TOC_CLUSTERS / buildTocClustersHtml in generate.mjs)
    -->
    <style>
      /* ── Brand CSS variables (inlined to avoid @import resolution issues) ── */
      :root {
        --brand-primary: {{BRAND_COLOR_PRIMARY}};
        --brand-primary-dark: {{BRAND_COLOR_PRIMARY_DARK}};
        --brand-primary-darker: {{BRAND_COLOR_PRIMARY_DARKER}};
        --brand-secondary: {{BRAND_COLOR_SECONDARY}};
        --brand-secondary-light: {{BRAND_COLOR_SECONDARY_LIGHT}};
        --brand-secondary-text: {{BRAND_COLOR_SECONDARY_TEXT}};
        --ink: #12231b;
        --paper: #ffffff;
        --muted: #f6f8f7;
        /* MH brand fonts */
        --font-heading: "Abolition", "Helvetica Neue", Arial, sans-serif;
        --font-body: "DIN 2014", "Helvetica Neue", Arial, "Liberation Sans", sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      @page {
        size: letter portrait;
        margin: 0.42in 0.5in 0.42in 0.5in;
      }

      /* ── Base ───────────────────────────────────────────── */
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--paper);
        color: var(--ink);
        /* DIN 2014 → Helvetica Neue fallback for body copy */
        font-family: var(--font-body);
        font-size: 9pt;
        line-height: 1.35;
      }

      /* Use flex-column so the footer is always at the bottom of the page */
      .toc-page {
        position: relative;
        display: flex;
        flex-direction: column;
        min-height: 10.16in; /* 11in − 2×0.42in margins */
        padding: 0.45in 0.48in 0.12in 0.88in; /* right gap mirrors left strip-to-content gap */
        background: var(--paper);
        overflow: hidden;
      }

      .toc-page::before {
        content: "";
        position: absolute;
        inset: 0.22in;
        border: 1.2pt solid var(--brand-primary-dark);
        pointer-events: none;
      }

      .toc-page::after {
        content: "";
        position: absolute;
        inset: 0.33in;
        border: 0.6pt solid var(--brand-secondary);
        pointer-events: none;
      }

      .toc-ribbon {
        position: absolute;
        top: 0.45in;
        bottom: 0.45in;
        left: 0.45in;
        width: 0.28in;
        background: linear-gradient(
          180deg,
          var(--brand-primary-dark) 0%,
          var(--brand-primary) 70%,
          var(--brand-secondary) 100%
        );
      }

      .toc-content {
        position: relative;
        z-index: 1;
      }

      /* ── Page Header ─────────────────────────────────────── */
      .toc-header {
        flex-shrink: 0;
        text-align: center;
        padding-bottom: 0.08in;
        margin-bottom: 0.08in;
        border-bottom: 1.2pt solid var(--brand-primary);
      }

      .toc-logo {
        height: 0.9in;
        width: auto;
        display: block;
        margin: 0 auto 0.05in;
      }

      /* Program chip — mirrors cover's MHC-APP chip */
      .toc-program-chip {
        width: fit-content;
        margin: 0 auto 0.05in;
        background: var(--muted);
        border: 0.8pt solid var(--brand-secondary-light);
        color: var(--brand-secondary-text);
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-family: var(--font-body);
        font-size: 6.5pt;
        font-weight: 800;
        padding: 2pt 10pt;
      }

      .toc-title {
        font-family: var(--font-heading);
        font-size: 16pt;
        font-weight: 900;
        color: var(--brand-primary-dark);
        margin: 0.04in 0 0.02in;
        letter-spacing: 0.01em;
        line-height: 1.05;
        text-transform: uppercase;
      }

      .toc-subtitle {
        font-family: var(--font-body);
        font-size: 7.5pt;
        font-weight: 700;
        color: var(--brand-primary);
        letter-spacing: 0.11em;
        text-transform: uppercase;
        margin: 0;
      }

      /* ── Body: dual-column grid ─────────────────────────── */
      .toc-body {
        flex: 1;
        columns: 2;
        column-gap: 0.28in;
        column-fill: balance;
        margin-top: 0.04in;
      }

      /* Each operational cluster stays together in one column */
      .cluster {
        break-inside: avoid;
        margin-bottom: 0.05in;
      }

      /* Cluster heading — Abolition Medium */
      .cluster-head {
        font-family: var(--font-heading);
        font-size: 7pt;
        font-weight: 500;
        color: var(--brand-primary);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin: 0 0 2pt;
        padding: 2pt 0 2pt;
        border-bottom: 0.75pt solid var(--brand-primary);
      }

      /* MISH entry list */
      .mish-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .mish-entry {
        display: flex;
        align-items: baseline;
        gap: 6pt;
        padding: 0.5pt 0;
        /* DIN 2014 for legibility in high-stress environments */
        font-family: var(--font-body);
        font-size: 9pt;
        line-height: 1.25;
        color: #000000;
      }

      .mish-code {
        flex-shrink: 0;
        width: 0.8in;
        font-family: var(--font-heading);
        font-size: 7.5pt;
        font-weight: 700;
        color: var(--brand-primary-dark);
      }

      .mish-wbs {
        display: none;
      }

      .mish-title {
        flex: 1;
        color: #000000;
        font-size: 8.6pt;
        line-height: 1.18;
        text-wrap: pretty;
        hyphens: auto;
      }

      /* Callout — Tan Leather highlight for critical safety protocols */
      .mish-entry.callout {
        background: #fff8f2;
        border-left: 1.75pt solid var(--brand-secondary);
        padding-left: 4pt;
        margin-left: -4pt;
        border-radius: 0 1pt 1pt 0;
      }

      .mish-entry.callout .mish-code {
        color: var(--brand-secondary-text);
        font-weight: 900;
      }

      .mish-entry.callout .mish-title {
        color: #000000;
        font-weight: 700;
      }

      /* ── Footer ─────────────────────────────────────────── */
      .toc-footer-row {
        flex-shrink: 0;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        padding-top: 0.06in;
        border-top: 0.7pt solid var(--brand-secondary-light);
        margin-top: 0.06in;
      }

      .toc-footer-left {
        font-family: var(--font-body);
        font-size: 6.5pt;
        color: var(--brand-secondary-text);
        white-space: nowrap;
      }

      /* ── Footer trust / accreditation logos — matches cover ──── */
      .toc-footer-trust {
        flex-shrink: 0;
        display: flex;
        align-items: flex-end;
        gap: 8pt;
      }

      .toc-footer-logo-agc {
        height: 0.32in;
        width: auto;
      }

      .toc-footer-logo-bbb {
        height: 0.36in;
        width: auto;
      }

      .toc-footer-logo-vob {
        height: 0.46in;
        width: auto;
      }

      /* ── Footer QR + revision ──────────────────────────── */
      .toc-footer-right {
        font-family: var(--font-body);
        font-size: 6.5pt;
        font-weight: 700;
        color: var(--brand-secondary-text);
        text-align: right;
        white-space: nowrap;
      }

      .toc-footer-qr {
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5pt;
      }

      .toc-footer-qr img {
        width: 0.44in;
        height: 0.44in;
        display: block;
      }

      .toc-footer-qr-label {
        font-family: var(--font-body);
        font-size: 5.5pt;
        font-weight: 700;
        color: var(--brand-secondary-text);
        text-align: center;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="toc-page">
      <div class="toc-ribbon" aria-hidden="true"></div>
      <div class="toc-content">
        <!-- ── Header ─────────────────────────────────────────── -->
        <header class="toc-header">
          <img
            class="toc-logo"
            src="{{BRAND_LOGO_COLOR}}"
            alt="MH Construction, Inc."
          />
          <h1 class="toc-title">Table of Contents</h1>
          <p class="toc-subtitle">
            MH Construction Industrial &amp; Safety Health Program
          </p>
        </header>

        <!-- ── Dual-Column Body ───────────────────────────────── -->
        <!-- Content is generated dynamically by generate.mjs buildTocClustersHtml(). -->
        <!-- Cluster definitions and callout rules live in TOC_CLUSTERS / TOC_CALLOUT_ITEMS. -->
        <main class="toc-body">{{TOC_CLUSTERS_HTML}}</main>

        <!-- ── Footer ─────────────────────────────────────────── -->
        <footer class="toc-footer-row">
          <span class="toc-footer-left"
            >{{BRAND_COMPANY_NAME}}&nbsp;&middot;&nbsp;{{BRAND_PHONE}}&nbsp;&middot;&nbsp;{{BRAND_WEBSITE}}</span
          >
          <!-- Accreditation and trust logos — mirrors cover footer -->
          <div class="toc-footer-trust">
            <img
              class="toc-footer-logo-agc"
              src="{{BRAND_AGC_HORIZONTAL}}"
              alt="AGC membership"
            />
            <img
              class="toc-footer-logo-bbb"
              src="{{BRAND_BBB_SEAL}}"
              alt="BBB accredited business"
            />
            <img
              class="toc-footer-logo-vob"
              src="{{BRAND_WA_VOB_LOGO}}"
              alt="Washington certified veteran owned business"
            />
          </div>
          <!-- QR code — scan to open the public table of contents page -->
          <div class="toc-footer-qr">
            <img src="{{QR_TOC_URL}}" alt="Scan for Table of Contents" />
            <span class="toc-footer-qr-label">Scan for TOC</span>
          </div>
          <span class="toc-footer-right"
            >Rev
            {{BRAND_REVISION_NUMBER}}&nbsp;&middot;&nbsp;{{BRAND_REVISION_DATE}}</span
          >
        </footer>
      </div>
    </div>
  </body>
</html>
