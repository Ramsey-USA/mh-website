<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MH Construction Website Page Inventory</title>
    <style>
      :root {
        --brand-primary: {{BRAND_COLOR_PRIMARY}};
        --brand-primary-dark: {{BRAND_COLOR_PRIMARY_DARK}};
        --brand-primary-darker: {{BRAND_COLOR_PRIMARY_DARKER}};
        --brand-secondary: {{BRAND_COLOR_SECONDARY}};
        --brand-secondary-light: {{BRAND_COLOR_SECONDARY_LIGHT}};
        --brand-secondary-text: {{BRAND_COLOR_SECONDARY_TEXT}};
        --ink: #12231b;
        --paper: #ffffff;
        --muted: #f6f8f7;
        --grid: #d7dfdb;
        --font-heading: "mendl-sans-dusk", "Mendl Sans Dusk", "DIN 2014", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        --font-body: "DIN 2014", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      @page {
        size: letter landscape;
        margin: 0;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 11in;
        background: var(--paper);
        color: var(--ink);
        font-family: var(--font-body);
      }

      .inventory-page {
        position: relative;
        width: 11in;
        min-height: 8.5in;
        overflow: hidden;
        background: var(--paper);
      }

      .inventory-page + .inventory-page {
        page-break-before: always;
        break-before: page;
      }

      .inventory-page::before {
        content: "";
        position: absolute;
        inset: 0.22in;
        border: 1.2pt solid var(--brand-primary);
        pointer-events: none;
      }

      .inventory-page::after {
        content: "";
        position: absolute;
        inset: 0.33in;
        border: 0.6pt solid var(--brand-secondary);
        pointer-events: none;
      }

      .left-ribbon {
        position: absolute;
        top: 0.45in;
        left: 0.45in;
        bottom: 0.45in;
        width: 0.28in;
        background: linear-gradient(
          180deg,
          var(--brand-primary) 0%,
          var(--brand-primary) 68%,
          var(--brand-secondary) 100%
        );
      }

      .identity {
        position: absolute;
        top: 0.55in;
        left: 0.95in;
        right: 0.93in;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 6.8pt;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--brand-primary);
      }

      .identity .dot {
        color: var(--brand-secondary);
        margin: 0 6pt;
      }

      .header {
        position: absolute;
        top: 0.86in;
        left: 0.95in;
        right: 0.93in;
        display: grid;
        grid-template-columns: minmax(0, 1.18fr) minmax(0, 0.82fr);
        gap: 0.18in;
        align-items: start;
        padding-bottom: 10pt;
        border-bottom: 1.2pt solid var(--brand-primary);
      }

      .header::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -3.5pt;
        height: 0.6pt;
        background: var(--brand-secondary);
      }

      .title-block {
        display: flex;
        align-items: flex-start;
        gap: 10pt;
      }

      .logo-wrap {
        padding: 6pt 8pt;
        border: 0.8pt solid var(--brand-secondary);
        background: var(--muted);
        border-radius: 6pt;
      }

      .logo {
        display: block;
        width: 1.15in;
        height: auto;
      }

      .title-copy {
        flex: 1;
        min-width: 0;
      }

      .program-chip {
        display: inline-block;
        margin-bottom: 5pt;
        padding: 3pt 8pt;
        border-radius: 1.5pt;
        background: var(--brand-primary);
        box-shadow: inset 0 -1pt 0 var(--brand-secondary);
        color: #fff;
        font-family: var(--font-heading);
        font-size: 7.2pt;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .page-title {
        margin: 0;
        color: var(--brand-primary);
        font-family: var(--font-heading);
        max-width: 4.35in;
        font-size: 17.5pt;
        font-weight: 900;
        line-height: 0.96;
        letter-spacing: 0.015em;
        text-transform: uppercase;
        text-wrap: balance;
      }

      .page-subtitle {
        margin: 4pt 0 0;
        color: var(--brand-secondary);
        max-width: 4.6in;
        font-size: 7.4pt;
        font-weight: 700;
        letter-spacing: 0.09em;
        line-height: 1.3;
        text-transform: uppercase;
      }

      .summary-card {
        border: 0.9pt solid var(--brand-secondary);
        background: linear-gradient(180deg, #ffffff 0%, var(--muted) 100%);
        border-radius: 8pt;
        padding: 10pt 11pt;
      }

      .summary-label {
        margin: 0 0 5pt;
        color: var(--brand-secondary);
        font-size: 6.5pt;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .summary-text {
        margin: 0;
        color: var(--brand-primary-darker);
        font-size: 8.2pt;
        line-height: 1.38;
      }

      .content {
        position: relative;
        z-index: 1;
        padding: 2.52in 0.95in 1.12in 0.95in;
      }

      .table-shell {
        border: 1pt solid var(--brand-primary);
        border-radius: 8pt;
        overflow: hidden;
        background: #fff;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      thead th {
        padding: 8pt 10pt;
        background: linear-gradient(
          90deg,
          var(--brand-primary) 0%,
          var(--brand-primary-dark) 100%
        );
        color: #fff;
        font-size: 6.8pt;
        font-weight: 800;
        letter-spacing: 0.13em;
        text-align: left;
        text-transform: uppercase;
        vertical-align: bottom;
      }

      tbody td {
        padding: 8pt 10pt;
        border-top: 0.6pt solid var(--grid);
        vertical-align: top;
        font-size: 8pt;
        line-height: 1.28;
        overflow-wrap: anywhere;
      }

      tbody tr:nth-child(even) td {
        background: #fbfcfb;
      }

      .route-cell {
        width: 12%;
      }

      .banner-cell {
        width: 19%;
      }

      .sections-cell {
        width: 50%;
      }

      .cta-cell {
        width: 19%;
      }

      .route {
        margin: 0;
        color: var(--brand-primary);
        font-family: var(--font-heading);
        font-size: 10pt;
        font-weight: 900;
        line-height: 1.05;
      }

      .route-source {
        margin: 4pt 0 0;
        color: var(--brand-secondary-text);
        font-size: 6.2pt;
        line-height: 1.2;
        word-break: break-word;
      }

      .banner {
        margin: 0;
        font-weight: 700;
        color: var(--ink);
        font-size: 8.8pt;
        line-height: 1.18;
      }

      .banner-note {
        margin: 4pt 0 0;
        color: var(--brand-secondary-text);
        font-size: 6.8pt;
        line-height: 1.24;
      }

      .section-list,
      .tag-list {
        margin: 0;
        padding-left: 14pt;
      }

      .section-list li,
      .tag-list li {
        margin: 0 0 2pt;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .empty {
        color: var(--brand-secondary-text);
        font-style: italic;
        font-size: 7.2pt;
        line-height: 1.2;
      }

      .footer {
        position: absolute;
        left: 0.95in;
        right: 0.93in;
        bottom: 0.55in;
        padding-top: 9pt;
        border-top: 1.2pt solid var(--brand-primary);
        display: grid;
        grid-template-columns: 1.45fr 1fr;
        gap: 0.25in;
        align-items: end;
      }

      .footer::before {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: 2.5pt;
        height: 0.6pt;
        background: var(--brand-secondary);
      }

      .footer-label {
        margin: 0 0 4pt;
        color: var(--brand-secondary);
        font-size: 6.7pt;
        font-weight: 800;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      .footer-name {
        margin: 0;
        color: var(--brand-primary);
        font-size: 8.2pt;
        font-weight: 800;
      }

      .footer-meta,
      .footer-page {
        margin: 2pt 0 0;
        color: var(--brand-secondary-text);
        font-size: 7.4pt;
        line-height: 1.25;
      }

      .trust-wrap {
        justify-self: end;
        text-align: right;
      }

      .trust-logos {
        display: flex;
        justify-content: flex-end;
        align-items: flex-end;
        gap: 10pt;
      }

      .trust-logos img.agc {
        height: 0.28in;
      }

      .trust-logos img.bbb {
        height: 0.32in;
      }

      .trust-logos img.vob {
        height: 0.4in;
      }
    </style>
  </head>
  <body>
    {{INVENTORY_PAGES_HTML}}
  </body>
</html>
