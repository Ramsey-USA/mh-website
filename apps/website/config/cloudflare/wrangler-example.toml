# ============================================================================
# wrangler-example.toml — LEGACY REFERENCE (Cloudflare Pages model)
# ============================================================================
#
# ⚠️  This file is NOT used in production. It is a reference for the
#     legacy Cloudflare Pages deployment model.
#
#     The ACTUAL production config is:  /wrangler.toml  (root of repo)
#     This project uses Cloudflare WORKERS via the OpenNext adapter.
#
#     See: docs/deployment/cloudflare-guide.md
# ============================================================================

name = "mh-construction-website"
main = "src/index.js"
compatibility_date = "2024-01-15"

[env.production]
name = "mh-construction-prod"
account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"
zone_id = "YOUR_CLOUDFLARE_ZONE_ID"

[env.staging]
name = "mh-construction-staging"
account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"
zone_id = "YOUR_CLOUDFLARE_ZONE_ID"

route = "mhc-gc.com/*"

[vars]
ENVIRONMENT = "production"
API_BASE_URL = "https://api.mhc-gc.com"

[[kv_namespaces]]
binding = "CACHE"
id = "your-kv-namespace-id"
preview_id = "your-preview-kv-namespace-id"

[build]
command = "npm run build"
cwd = "."
watch_dir = "src"
status = 302