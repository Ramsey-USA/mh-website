<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 100" width="190" height="100">
  <!-- US Flag proportions: 1.9:1 ratio — public domain design -->
  <!-- 13 stripes: 7 red, 6 white -->
  <rect width="190" height="100" fill="#B22234"/>
  <rect y="7.69" width="190" height="7.69" fill="white"/>
  <rect y="23.08" width="190" height="7.69" fill="white"/>
  <rect y="38.46" width="190" height="7.69" fill="white"/>
  <rect y="53.85" width="190" height="7.69" fill="white"/>
  <rect y="69.23" width="190" height="7.69" fill="white"/>
  <rect y="84.62" width="190" height="7.69" fill="white"/>
  <!-- Canton (union) — blue field -->
  <rect width="76" height="53.85" fill="#3C3B6E"/>
  <!-- 50 stars: 5 rows of 6 + 4 rows of 5 = 50 (simplified to 9 rows) -->
  <!-- Row pattern: odd=6 stars, even=5 stars, staggered -->
  <g fill="white" font-size="6">
    <!-- Row 1 (6 stars) y=5.5 -->
    <text x="4"  y="9">★</text><text x="12.2" y="9">★</text><text x="20.4" y="9">★</text>
    <text x="28.6" y="9">★</text><text x="36.8" y="9">★</text><text x="45" y="9">★</text>
    <!-- Row 2 (5 stars) y=11.5 -->
    <text x="8.1" y="15">★</text><text x="16.3" y="15">★</text><text x="24.5" y="15">★</text>
    <text x="32.7" y="15">★</text><text x="40.9" y="15">★</text>
    <!-- Row 3 (6 stars) y=17.5 -->
    <text x="4"  y="21">★</text><text x="12.2" y="21">★</text><text x="20.4" y="21">★</text>
    <text x="28.6" y="21">★</text><text x="36.8" y="21">★</text><text x="45" y="21">★</text>
    <!-- Row 4 (5 stars) y=23.5 -->
    <text x="8.1" y="27">★</text><text x="16.3" y="27">★</text><text x="24.5" y="27">★</text>
    <text x="32.7" y="27">★</text><text x="40.9" y="27">★</text>
    <!-- Row 5 (6 stars) y=29.5 -->
    <text x="4"  y="33">★</text><text x="12.2" y="33">★</text><text x="20.4" y="33">★</text>
    <text x="28.6" y="33">★</text><text x="36.8" y="33">★</text><text x="45" y="33">★</text>
    <!-- Row 6 (5 stars) y=35.5 -->
    <text x="8.1" y="39">★</text><text x="16.3" y="39">★</text><text x="24.5" y="39">★</text>
    <text x="32.7" y="39">★</text><text x="40.9" y="39">★</text>
    <!-- Row 7 (6 stars) y=41.5 -->
    <text x="4"  y="45">★</text><text x="12.2" y="45">★</text><text x="20.4" y="45">★</text>
    <text x="28.6" y="45">★</text><text x="36.8" y="45">★</text><text x="45" y="45">★</text>
    <!-- Row 8 (5 stars) y=47.5 -->
    <text x="8.1" y="50.5">★</text><text x="16.3" y="50.5">★</text><text x="24.5" y="50.5">★</text>
    <text x="32.7" y="50.5">★</text><text x="40.9" y="50.5">★</text>
    <!-- Row 9 (6 stars) y=53.5 -->
    <text x="4"  y="56.5">★</text><text x="12.2" y="56.5">★</text><text x="20.4" y="56.5">★</text>
    <text x="28.6" y="56.5">★</text><text x="36.8" y="56.5">★</text><text x="45" y="56.5">★</text>
  </g>
</svg>
