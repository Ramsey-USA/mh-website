name = "mhc-v2-website"
main = ".open-next/worker.js"
compatibility_date = "2026-03-25"
compatibility_flags = ["nodejs_compat"]

# Workers Assets — serves the static output from opennextjs-cloudflare
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Build-time / runtime environment variables
# These are committed to version control — DO NOT put secrets here.
# NEXT_PUBLIC_SITE_URL is baked into the Next.js client bundle at build time.
# next.config.js falls back to this value if the dashboard var is missing, so
# the dashboard setting is redundant but still recommended for clarity.
[vars]
NEXT_PUBLIC_SITE_URL = "https://www.mhc-gc.com"
# Google Analytics measurement ID — replace with the real G-XXXXXXXXXX value.
# NEXT_PUBLIC_* vars are baked into the client bundle at build time; they must be
# present here (or in the CF dashboard) before running `wrangler deploy`.
# NEXT_PUBLIC_GA_MEASUREMENT_ID = "G-XXXXXXXXXX"

# NOTE: This is a Cloudflare Workers project (NOT Pages).
# Deployment: `wrangler deploy` (not `wrangler pages deploy`).
# Preview URL:  *-mhc-v2-website.twelthmann.workers.dev
# Workers URL:  mhc-v2-website.twelthmann.workers.dev
# Do NOT create a wrangler.jsonc file — wrangler reads .jsonc before .toml,
# and a malformed .jsonc silently overrides all config.

# Custom domain routes — keep in sync with the CF dashboard to prevent
# wrangler deploy from overriding (and removing) the dashboard bindings.
[[routes]]
pattern = "mhc-gc.com"
zone_name = "mhc-gc.com"
custom_domain = true

[[routes]]
pattern = "www.mhc-gc.com"
zone_name = "mhc-gc.com"
custom_domain = true

# Runtime secrets — set via `wrangler secret put <NAME>` or the Cloudflare Workers
# dashboard (Workers & Pages → mhc-v2-website → Settings → Variables & Secrets).
# Missing secrets cause silent failures (email/SMS won't send) or hard errors
# (JWT_SECRET, ADMIN_*_PASSWORD throw at request time in production).
#
# Required secrets:
#   JWT_SECRET               — HMAC key for session tokens (min 32 chars)
#   ADMIN_MATT_PASSWORD      — Login password for Matt
#   ADMIN_JEREMY_PASSWORD    — Login password for Jeremy
#   RESEND_API_KEY           — Resend API key (re_xxxx) for outbound email
#   EMAIL_FROM               — Sender address (e.g. office@mhc-gc.com)
#   TWILIO_ACCOUNT_SID       — Twilio account SID for SMS notifications
#   TWILIO_AUTH_TOKEN        — Twilio auth token for SMS notifications
#   TWILIO_FROM_NUMBER       — Twilio phone number (e.g. +15093086489)

# Deployment is triggered by `wrangler deploy` after `opennextjs-cloudflare build`.
# The CI pipeline (.github/workflows/ci-cd.yml) is a quality gate only —
# it does not run `wrangler deploy`.
#
# Bindings below (D1, R2) are read by Cloudflare Workers at deploy time.
# KV namespaces are reserved for future use but not yet bound in the dashboard.
# To activate KV, create the namespaces in the CF dashboard, then replace the
# placeholder IDs below with real namespace IDs.

# KV Namespaces
#
# CACHE — required for fleet-wide rate limiting (security + DoS protection).
# Without CACHE, src/lib/security/rate-limiter.ts silently falls back to a
# per-isolate Map, meaning rate limits are NOT shared across the Worker fleet.
#
# To provision:
#   1. wrangler kv namespace create CACHE
#      → copy the returned `id` value below
#   2. wrangler kv namespace create CACHE --preview
#      → copy the returned `id` value as `preview_id`
#   3. Uncomment the [[kv_namespaces]] block and paste both IDs.
#   4. Run `wrangler deploy` — no code changes needed; rate-limiter.ts auto-detects.
#
[[kv_namespaces]]
binding = "CACHE"
id = "b6ecda1ca7a7463db0f8a3b5d9681131"
# preview_id — run `wrangler kv namespace create CACHE --preview` to get this value,
# then set it here. Required for local `wrangler dev` sessions; not needed for production.
#
# NEXT_CACHE_WORKERS_KV — required for ISR (Incremental Static Regeneration).
# 13 pages declare `export const revalidate = 86400` (location pages, team,
# testimonials). Without this binding, those pages are built once at deploy time
# and never re-rendered — `revalidate` has no effect. For now the content is
# purely static local data so this is functionally acceptable.
#
# To activate ISR revalidation:
#   1. wrangler kv namespace create NEXT_CACHE_WORKERS_KV
#   2. wrangler kv namespace create NEXT_CACHE_WORKERS_KV --preview
#   3. Uncomment and fill in:
# [[kv_namespaces]]
# binding = "NEXT_CACHE_WORKERS_KV"
# id = "YOUR_NEXT_CACHE_KV_ID"
# preview_id = "YOUR_NEXT_CACHE_KV_PREVIEW_ID"
#
# ANALYTICS — reserved for server-side analytics aggregation (currently localStorage).
# [[kv_namespaces]]
# binding = "ANALYTICS"
# id = "YOUR_ANALYTICS_KV_ID"
# preview_id = "YOUR_ANALYTICS_KV_PREVIEW_ID"

# R2 buckets for file storage
[[r2_buckets]]
binding = "FILE_ASSETS"
bucket_name = "mh-construction-assets"

[[r2_buckets]]
binding = "RESUMES"
bucket_name = "mh-construction-resumes"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "mh-construction-db"
database_id = "98ad144a-cfe2-4f19-a55c-c43140279840"
preview_database_id = "6c6c5bd7-41b8-4968-8421-3cca5f97b160"
