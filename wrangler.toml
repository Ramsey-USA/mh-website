name = "mh-construction-website"
pages_build_output_dir = ".open-next/assets"
compatibility_date = "2026-03-15"
compatibility_flags = ["nodejs_compat_v2"]

# Runtime secrets — set via `wrangler secret put <NAME>` or the Cloudflare Pages
# dashboard (Settings → Environment variables → Add variable → Secret).
# Missing secrets cause silent failures (email/SMS won't send) or hard errors
# (JWT_SECRET, ADMIN_*_PASSWORD throw at request time in production).
#
# Required secrets:
#   JWT_SECRET               — HMAC key for session tokens (min 32 chars)
#   ADMIN_MATT_PASSWORD      — Login password for Matt
#   ADMIN_JEREMY_PASSWORD    — Login password for Jeremy
#   RESEND_API_KEY           — Resend API key (re_xxxx) for outbound email
#   EMAIL_FROM               — Sender address (e.g. office@mhc-gc.com)
#   TWILIO_ACCOUNT_SID       — Twilio account SID for SMS notifications
#   TWILIO_AUTH_TOKEN        — Twilio auth token for SMS notifications
#   TWILIO_FROM_NUMBER       — Twilio phone number (e.g. +15093086489)

# The ${...} placeholders below must be replaced by your CI pipeline before
# running `wrangler pages deploy` (e.g. via envsubst or a sed step).
# In Cloudflare Pages dashboard builds, use the "Environment variables" section
# to set these values — they are injected automatically by the build system.

# KV Namespaces for caching and analytics
[[kv_namespaces]]
binding = "CACHE"
id = "${CLOUDFLARE_KV_NAMESPACE_ID}"
preview_id = "${CLOUDFLARE_KV_PREVIEW_NAMESPACE_ID}"

[[kv_namespaces]]
binding = "ANALYTICS"
id = "${CLOUDFLARE_ANALYTICS_KV_ID}"
preview_id = "${CLOUDFLARE_ANALYTICS_KV_PREVIEW_ID}"

# R2 buckets for file storage
[[r2_buckets]]
binding = "FILE_ASSETS"
bucket_name = "mh-construction-assets"

[[r2_buckets]]
binding = "RESUMES"
bucket_name = "mh-construction-resumes"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "mh-construction-db"
database_id = "98ad144a-cfe2-4f19-a55c-c43140279840"
preview_database_id = "6c6c5bd7-41b8-4968-8421-3cca5f97b160"
