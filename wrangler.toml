name = "mh-construction-website"
compatibility_date = "2025-03-15"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".open-next/assets"

[build]
command = "npm run build"

# KV Namespaces for caching and analytics
[[kv_namespaces]]
binding = "CACHE"
id = "${CLOUDFLARE_KV_NAMESPACE_ID}"
preview_id = "${CLOUDFLARE_KV_PREVIEW_NAMESPACE_ID}"

[[kv_namespaces]]
binding = "ANALYTICS"
id = "${CLOUDFLARE_ANALYTICS_KV_ID}"
preview_id = "${CLOUDFLARE_ANALYTICS_KV_PREVIEW_ID}"

# R2 buckets for file storage
[[r2_buckets]]
binding = "FILE_ASSETS"
bucket_name = "mh-construction-assets"

[[r2_buckets]]
binding = "RESUMES"
bucket_name = "mh-construction-resumes"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "mh-construction-db"
database_id = "98ad144a-cfe2-4f19-a55c-c43140279840"
preview_database_id = "6c6c5bd7-41b8-4968-8421-3cca5f97b160"
